function condBadges(g) {
  const wx = activeWX[g.id]||{};
  const badges = [];
  // Wind
  if(wx.dome) badges.push(`<span class="cbdg wc">DOME</span>`);
  else if((wx.w||0)<3) badges.push(`<span class="cbdg wc">CALM</span>`);
  else if(wx.d==='out') badges.push(`<span class="cbdg wo">↑${wx.w}mph OUT</span>`);
  else if(wx.d==='in')  badges.push(`<span class="cbdg wi">↓${wx.w}mph IN</span>`);
  else badges.push(`<span class="cbdg wc">↔${wx.w||0}mph X</span>`);
  // Temp
  if(wx.t) badges.push(`<span class="cbdg tmp">${wx.t}°F</span>`);
  // Park factor
  const pf = g.pf||100;
  if(pf>=120) badges.push(`<span class="cbdg pf-hi">PF ${pf} HR PARK</span>`);
  else if(pf>=108) badges.push(`<span class="cbdg pf-hi">PF ${pf}</span>`);
  else if(pf<=93) badges.push(`<span class="cbdg pf-lo">PF ${pf} PITCHER</span>`);
  else badges.push(`<span class="cbdg pf-md">PF ${pf}</span>`);
  // Game total
  if(g.gameTotal) badges.push(`<span class="cbdg tot">O/U ${g.gameTotal}</span>`);
  // Ump
  if(g.hpUmp && Math.abs(g.hpUmp)>=1) badges.push(`<span class="cbdg ump">⚖ UMP ${g.hpUmp>0?'+':''}${g.hpUmp}</span>`);
  return badges.join('');
}

function pitcherPill(pitcher, teamAbbr) {
  // kept for any legacy callers — delegates to matchup card
  return pitcherMatchupCard(pitcher, teamAbbr);
}

function pitcherMatchupCard(p, team) {
  const M = 'font-family:\'JetBrains Mono\',monospace';
  if(!p || p.n==='TBD') return `<div class="gc-pm-card"><span style="${M};font-size:9px;color:var(--muted)">${team} · TBD</span></div>`;
  const ec = eraClass(p.era);
  const vel = (p.vel && p.vel !== 92.5) ? p.vel : null;

  // Top 3 pitch types compact
  const pitchTypes = Object.entries(p.arsenal||{})
    .filter(([,v]) => v.pct > 0)
    .sort((a,b) => b[1].pct - a[1].pct)
    .slice(0, 3);
  const arsenalLine = pitchTypes.length
    ? pitchTypes.map(([pt,v]) => {
        const wc = (v.whiff_pct||0)>=30?'kg':(v.whiff_pct||0)>=20?'ka':'kr';
        return `<span class="kst ${wc}" style="font-size:9px;padding:1px 4px">${pt} ${v.pct.toFixed(0)}%</span>`;
      }).join('')
    : '';

  const fipColor = !p.fip ? '' : p.fip<=3.2?'var(--green)':p.fip>=4.5?'var(--red)':'var(--amber)';
  const recentC = eraClass(p.recentEra||p.era);

  return `<div class="gc-pm-card">
    <div class="gc-pm-top">
      <div>
        <span class="gc-pm-team">${team}</span>
        <span class="gc-pm-name">${p.n}</span>
        <span class="gc-pm-hand">${p.h||'R'}HP</span>
      </div>
      ${vel?`<span class="gc-pm-vel">${vel}<span style="font-size:8px;color:var(--muted)">mph</span></span>`:''}
    </div>
    <div class="gc-pm-stats">
      <div class="gc-pm-stat"><span class="gc-pm-sv ${ec}">${p.era.toFixed(2)}</span><span class="gc-pm-sl">ERA</span></div>
      ${p.fip?`<div class="gc-pm-stat"><span class="gc-pm-sv" style="color:${fipColor}">${p.fip.toFixed(2)}</span><span class="gc-pm-sl">FIP</span></div>`:''}
      ${p.xera?`<div class="gc-pm-stat"><span class="gc-pm-sv ${eraClass(p.xera)}">${p.xera.toFixed(2)}</span><span class="gc-pm-sl">xERA</span></div>`:''}
      <div class="gc-pm-stat"><span class="gc-pm-sv ${recentC}">${(p.recentEra||p.era).toFixed(2)}</span><span class="gc-pm-sl">REC</span></div>
      ${p.k9?`<div class="gc-pm-stat"><span class="gc-pm-sv" style="color:var(--sub)">${p.k9.toFixed(1)}</span><span class="gc-pm-sl">K/9</span></div>`:''}
    </div>
    ${arsenalLine?`<div style="display:flex;gap:3px;flex-wrap:wrap;margin-top:4px">${arsenalLine}</div>`:''}
    <div class="gc-pm-dots">${formDots(p.recentEra||p.era, p.era, p.fatigued, p.starts)}</div>
  </div>`;
}


function renderGameCard(g) {
  if(activeTab==='soon' && !gameStartsWithin3Hours(g)) return '';

  const allPlayers = buildPlayers(g);
  let filtered = [...allPlayers].sort((a,b)=>b.score-a.score);
  if(activeTab==='stars')     filtered = filtered.filter(p=>p.score>=80);
  if(activeTab==='good')      filtered = filtered.filter(p=>p.score>=65);
  if(activeTab==='hot')       filtered = filtered.filter(p=>p.hotStreak);
  if(activeTab==='platoon')   filtered = filtered.filter(p=>p.platoon>=8);
  if(searchQ) { const sq=searchQ.toLowerCase(); filtered=filtered.filter(p=>p.name.toLowerCase().includes(sq)||p.team.toLowerCase().includes(sq)); }
  if(!filtered.length && activeTab!=='all' && activeTab!=='soon') return '';

  const isExp = expandedGames.has(g.id);
  const wx = activeWX[g.id]||{};
  const arrow = isExp ? '▲' : '▼';
  const stackBadge = g.isStack ? `<span class="cbdg stk">⚡ STACK ×${g.stackCount}</span>` : '';
  const gameTotal = g.gameTotal > 0 ? `<span class="cbdg tot" title="Vegas game total">O/U ${g.gameTotal.toFixed(1)}</span>` : '';
  // Lineup urgency: game within 60 min and has players without confirmed lineup
  const hasUnconfirmed = allPlayers.some(p => !p.confirmed);
  const lockBadge = lockBadgeHtml(g);
  const urgencyBadge = (gameStartsWithin3Hours(g) && hasUnconfirmed && !g.status?.startsWith('I'))
    ? `<span class="cbdg tbd" title="Lineup not yet confirmed">⚠ LINEUP TBD</span>` : '';

  return `<div class="game-card${isExp?' expanded':''}" id="gc-${g.id}">
    <div class="gc-head" onclick="toggleGame('${g.id}')">
      <div class="gc-hdr1">
        <div class="gc-hdr-left">
          <div class="gc-matchup">${g.aw} <span style="color:var(--muted)">@</span> ${g.hm}</div>
          <div class="gc-meta">${g.time} · ${g.venue}</div>
        </div>
        <div class="gc-hdr-conds">${stackBadge}${gameTotal}${urgencyBadge}${condBadges(g)}</div>
        <div class="gc-toggle">
          ${lockBadge}
          ${wx.dome?'<span class="gc-live">DOME</span>':''}
          <span>${arrow} ${isExp ? 'HIDE' : allPlayers.length + ' PLAYERS'}</span>
        </div>
      </div>
      <div class="gc-pm-row">
        ${pitcherMatchupCard(g.ap, g.aw)}
        ${pitcherMatchupCard(g.hp, g.hm)}
      </div>
    </div>
    ${isExp ? renderGameDetail(g, filtered) : ''}
  </div>`;
}

  return `<div class="pitcher-detail-card ${ec}">
    <div class="pdc-team">${teamAbbr}</div>
    <div class="pdc-name">${pitcher.n} <span class="pdc-hand">${pitcher.h}HP</span></div>
    <div class="pdc-stats">
      <div class="pdc-stat"><span class="lbl">ERA</span><span class="val ${ec}">${pitcher.era.toFixed(2)}</span></div>
      <div class="pdc-stat"><span class="lbl">REC.ERA</span><span class="val ${eraClass(pitcher.recentEra)}">${pitcher.recentEra.toFixed(2)}</span></div>
      <div class="pdc-stat"><span class="lbl">FB%</span><span class="val">${pitcher.fb||38}%</span></div>
      ${vel?`<div class="pdc-stat"><span class="lbl">VEL</span><span class="val">${vel}mph</span></div>`:''}
    </div>
    <div class="pdc-form">
      <span class="pdc-form-lbl">L5:</span>
      ${formDots(pitcher.recentEra, pitcher.era, pitcher.fatigued, pitcher.starts)}
      ${pitcher.fatigued?'<span style="font-family:\'JetBrains Mono\',monospace;font-size:8px;color:var(--red);margin-left:5px">⚡ FATIGUED</span>':''}
    </div>
    ${pitcher.starts && pitcher.starts.length ? `
    <div style="margin-top:7px;border-top:1px solid var(--border);padding-top:6px">
      ${pitcher.starts.slice(0,5).map(s => {
        const c = s.quality==='good'?'var(--green)':s.quality==='bad'?'var(--red)':'var(--amber)';
        const ipFmt = s.ip % 1 === 0 ? `${s.ip}.0` : s.ip;
        const hrBadge = s.hr > 0 ? `<span style="color:var(--red);font-weight:700"> ${s.hr}HR</span>` : '';
        return `<div style="display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:8px;padding:2px 0;border-bottom:1px solid var(--dim)">
          <span style="color:var(--muted);width:52px;flex-shrink:0">${s.date||''}</span>
          <span style="color:var(--sub);width:26px;flex-shrink:0">@${s.opp}</span>
          <span style="color:${c};font-weight:700;width:36px;flex-shrink:0">${ipFmt}IP</span>
          <span style="color:${c};font-weight:700">${s.er}ER${hrBadge}</span>
          <span style="color:var(--muted);margin-left:auto">${s.k}K ${s.bb}BB ${s.pc}p</span>
        </div>`;
      }).join('')}
    </div>` : ''}
  </div>`;
}

// Per-game active team tab state
const gameTeamTab = {};  // gameId → 'away' | 'home'

function switchGameTeam(gameId, side, event) {
  event.stopPropagation();
  gameTeamTab[gameId] = side;
  render();
}

function renderGameDetail(g, players) {
  const wx = activeWX[g.id]||{};
  const sp0 = g.serverPlayers && g.serverPlayers[0];
  const umpName = sp0 ? (sp0.hpUmp||'') : '';

  const sortFn = (a,b) => {
    const col = sortCol||'score';
    const av = a[col]||0, bv = b[col]||0;
    const inv = col === 'whiffPct';
    const dir = sortDir==='asc' ? 1 : -1;
    return inv ? (av - bv) * dir : (bv - av) * dir;
  };

  const awayPlayers = players.filter(p=>p.team===g.aw).sort(sortFn);
  const homePlayers = players.filter(p=>p.team===g.hm).sort(sortFn);
  const matched = new Set([...awayPlayers,...homePlayers].map(p=>p.name));
  const rest = players.filter(p=>!matched.has(p.name)).sort(sortFn);

  // Determine active side
  const activeSide = gameTeamTab[g.id] || 'away';
  const activePlayers = activeSide === 'away' ? awayPlayers : homePlayers;
  const activeAbbr = activeSide === 'away' ? g.aw : g.hm;
  const opp = activeSide === 'away' ? g.hp : g.ap;
  const oppName = opp ? opp.n : '?';
  const oppEra  = opp ? opp.era.toFixed(2) : '?.??';
  const oppK9   = opp && opp.k9 > 0 ? ` · ${opp.k9.toFixed(1)} K/9` : '';
  const oppHand = opp ? ` · ${opp.h}HP` : '';

  const awayCount = awayPlayers.length;
  const homeCount = homePlayers.length;

  const teamTabs = `<div class="gc-team-tabs">
    <button class="gc-ttab${activeSide==='away'?' on':''}" onclick="switchGameTeam('${g.id}','away',event)">
      ${g.aw} <span class="gc-ttab-ct">${awayCount}</span>
    </button>
    <button class="gc-ttab${activeSide==='home'?' on':''}" onclick="switchGameTeam('${g.id}','home',event)">
      ${g.hm} <span class="gc-ttab-ct">${homeCount}</span>
    </button>
  </div>`;

  const sectionHeader = `<tr class="section-row"><td colspan="12">${activeAbbr} BATTERS — vs ${oppName} (${oppEra} ERA${oppHand}${oppK9})</td></tr>`;
  const tableRows = sectionHeader + activePlayers.map(p=>playerRow(p,g)).join('')
    + (rest.length && activeSide==='away' ? rest.map(p=>playerRow(p,g)).join('') : '');

  return `<div class="gc-detail">
    ${teamTabs}
    ${umpName ? `<div style="padding:0 16px 6px"><span class="cbdg ump">⚖ ${umpName}</span></div>` : ''}
    <div class="pt-wrap">
      <table class="pt">
        <thead><tr>
          <th class="td-ph"></th>
          <th onclick="setSort('name')">PLAYER <span class="th-sort${sortCol==='name'?' '+sortDir:''}"></span></th>
          <th class="c" onclick="setSort('score')">SCORE <span class="th-sort${sortCol==='score'?' '+sortDir:''}"></span></th>
          <th class="c" onclick="setSort('hrForm')">FORM <span class="th-sort${sortCol==='hrForm'?' '+sortDir:''}"></span></th>
          <th class="c" onclick="setSort('ISO')">ISO</th>
          <th class="c" onclick="setSort('xwOBA')">xwOBA</th>
          <th class="c" onclick="setSort('barrel')">Brl/BIP <span class="th-sort${sortCol==='barrel'?' '+sortDir:''}"></span></th>
          <th class="c" onclick="setSort('whiffPct')">SwStr%</th>
          <th class="c" onclick="setSort('sweetSpot')">Sweet%</th>
          <th class="c" onclick="setSort('flyBall')">FB%</th>
          <th class="c" onclick="setSort('hardHit')">HH%</th>
          <th class="c" onclick="setSort('la')">LA</th>
        </tr></thead>
        <tbody>${tableRows}</tbody>
      </table>
    </div>
  </div>`;
}

// Kasper-style heat-map cell — higher is better unless inv=true
function kCell(val, fmt, gMin, aMin, inv=false) {
  const v = val || 0;
  const display = v > 0 ? fmt(v) : '—';
  if (!v) return `<td class="kst"><span style="color:var(--dim)">${display}</span></td>`;
  const cls = inv
    ? (v <= gMin ? 'kg' : v <= aMin ? 'ka' : 'kr')
    : (v >= gMin ? 'kg' : v >= aMin ? 'ka' : 'kr');
  return `<td class="kst ${cls}">${display}</td>`;
}

// Launch angle: optimal HR range is 15–30°
function laCell(la) {
  if (!la) return `<td class="kst"><span style="color:var(--dim)">—</span></td>`;
  const cls = (la >= 15 && la <= 30) ? 'kg' : (la >= 10 && la <= 35) ? 'ka' : 'kr';
  return `<td class="kst ${cls}">${la.toFixed(0)}°</td>`;
}

function playerRow(p, g) {
  const sel = false;
  const photo = p.mlbId ? `<img src="https://img.mlbstatic.com/mlb-photos/image/upload/w_213,d_people:generic:headshot:silo:current.png,q_auto:best,f_auto/v1/people/${p.mlbId}/headshot/67/current">` : '';
  const sc = scoreColor(p.tier);
  const edges = computeEdges(p, g);
  const probWidth = Math.min(100, (p.hrProb||0) / 32 * 100);

  // H2H display
  let h2hHtml = '';
  if(p.h2h && p.h2h.ab >= 3) {
    const h2hColor = p.h2h.hr >= 1 ? 'var(--green)' : p.h2h.ops <= 0.45 ? 'var(--red)' : 'var(--sub)';
    h2hHtml = `<div class="vs-h2h" style="color:${h2hColor}">${p.h2h.h}/${p.h2h.ab} AB · ${p.h2h.hr}HR · .${String(Math.round((p.h2h.ops||0)*1000)).padStart(3,'0')} H2H</div>`;
  }

  const legData = JSON.stringify({name:p.name,team:p.team,gameId:p.gameId,score:p.score,pitcher:p.pitcher.n,hrPct:p.hrPct,barrel:p.barrel,hrProb:p.hrProb||0});

  // Score breakdown tooltip — use server breakdown if available, else derive from client data
  const bd = p.scoreBreakdown || null;
  let tipItems;
  if (bd) {
    tipItems = [
      bd.platoon != null && {l: bd.platoon>0?'Platoon adv':'Platoon disadv', v: bd.platoon},
      bd.recency         && {l: bd.recency>0?'Hot streak 🔥':'Cold streak ❄️', v: bd.recency},
      bd.wind            && {l: 'Wind', v: bd.wind},
      bd.park            && {l: `Park (PF ${g.pf||100})`, v: bd.park},
      bd.h2h             && {l: 'H2H matchup', v: bd.h2h},
      bd.pitch           && {l: 'Pitch matchup', v: bd.pitch},
      bd.elite_p         && {l: 'Elite pitcher', v: bd.elite_p},
      bd.vuln_p          && {l: 'Pitcher danger', v: bd.vuln_p},
      bd.fatigue         && {l: 'Pitcher fatigued', v: bd.fatigue},
      bd.barrel          && {l: 'Barrel power', v: bd.barrel},
      bd.flyball         && {l: 'Fly ball rate', v: bd.flyball},
      bd.whiff           && {l: 'K-risk (whiff)', v: bd.whiff},
      bd.kpitch          && {l: 'High-K pitcher', v: bd.kpitch},
    ].filter(Boolean).filter(x => x.v !== 0);
  } else {
    // Fallback: derive key components from data already on the client
    const platV = platAdj(p.bats, p.pitcher.h);
    const parkV = Math.round(((g.pf||100) - 100) / 50 * 12);
    const barrelV = Math.round(Math.min(((p.barrel||0) - 8) * 1.5, 14));
    const windV = (() => {
      const wx = activeWX[g.id]||{};
      if (wx.dome || !wx.wind_mph) return 0;
      const m = wx.wind_mph; const d = wx.direction;
      if (d==='out') return Math.round(m * 0.55 * 0.70);
      if (d==='in')  return -Math.round(m * 0.65 * 0.70);
      return 0;
    })();
    tipItems = [
      { l: platV>0?'Platoon adv':'Platoon disadv', v: platV },
      windV  !== 0 && { l: 'Wind',         v: windV  },
      parkV  !== 0 && { l: `Park (PF ${g.pf||100})`, v: parkV },
      barrelV!== 0 && { l: 'Barrel power', v: barrelV },
    ].filter(Boolean).filter(x => x.v !== 0);
  }
  // Visual bar-based tooltip (top 4 drivers only)
  const MAX_V = 16;
  const tipHtml = tipItems.length ? `<div class="score-tip">
    <div class="stip-hd">Score Drivers</div>
    <div class="stip-bar-wrap">
    ${tipItems.sort((a,b)=>Math.abs(b.v)-Math.abs(a.v)).slice(0,5).map(x => {
      const pos = x.v > 0;
      const pct = Math.min(Math.abs(x.v) / MAX_V * 100, 100);
      return `<div class="stip-bar-row">
        <span class="stip-bar-lbl">${x.l}</span>
        <div class="stip-bar-track"><div class="stip-bar-fill ${pos?'pos':'neg'}" style="width:${pct}%"></div></div>
        <span class="stip-bar-val ${pos?'pos':'neg'}">${x.v>0?'+':''}${x.v}</span>
      </div>`;
    }).join('')}
    </div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-top:4px;border-top:1px solid var(--border);padding-top:4px">Total score: ${p.score}/99</div>
  </div>` : '';

  const trend = trendHtml(p);
  const form7 = (p.recentG7d >= 3 && p.recentHR7d > 0) ? `· ${p.recentHR7d}HR/${p.recentG7d}G` : '';

  // Day-before indicator
  const ydayStr = p.lastGameAB > 0 ? `${p.lastGameH}/${p.lastGameAB}` : null;
  const ydayCls = p.prevOhFor ? 'yday-ohfor' : (p.lastGameHR > 0 ? 'yday-hr' : 'yday-norm');
  const ydayHtml = ydayStr ? `<span class="p-yday ${ydayCls}" title="Last game: ${p.lastGameH}-for-${p.lastGameAB}${p.lastGameHR>0?' (HR)':''}">${ydayStr}${p.lastGameHR>0?' ⚡':''}</span>` : '';
  const sinceHtml = p.gamesSinceHR >= 5 ? `<span class="p-since-hr" title="${p.gamesSinceHR} games without a HR">${p.gamesSinceHR}G↯</span>` : '';

  // HR Form: (recent15d HR rate / season HR rate) × 50, where 50 = exactly on pace
  const formScore = p.hrPct > 0 ? Math.min(99, Math.max(0, Math.round(p.recentHRPct / p.hrPct * 50))) : 0;
  const formArrow = p.trend >= 2 ? '↑↑' : p.trend >= 1 ? '↑' : p.trend <= -2 ? '↓↓' : p.trend <= -1 ? '↓' : '→';
  const formCls   = formScore >= 60 ? 'kg' : formScore >= 40 ? 'ka' : (formScore > 0 ? 'kr' : '');

  // Pitch matchup chips (compact)
  const pitchChips = p.pitchMatchup && p.pitchMatchup.length ? p.pitchMatchup.slice(0,3).map(m => {
    const c = m.verdict==='CRUSHES'?'#10B981':m.verdict==='STRUGGLES'?'#EF4444':'#475569';
    const bg = m.verdict==='CRUSHES'?'rgba(16,185,129,.1)':m.verdict==='STRUGGLES'?'rgba(239,68,68,.1)':'rgba(71,85,105,.08)';
    return `<span style="font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:700;padding:1px 5px;border-radius:3px;background:${bg};color:${c};border:1px solid ${c}40;white-space:nowrap">${m.name.split(' ')[0]} ${m.pct}%</span>`;
  }).join('') : '';

  return `<tr class="pr">
  <!-- Photo -->
  <td class="td-ph">
    <div class="p-photo-wrap">
      <div class="p-photo">⚾${photo}</div>
    </div>
  </td>
  <!-- Player cell: name + pitcher + edges -->
  <td class="td-player">
    <div class="p-name">
      ${p.name} ${trend}
      <span class="p-team">${p.team}</span>
      <span class="p-pos">${p.pos||'?'}</span>
      ${p.lineupPos>0?`<span class="p-ord">#${p.lineupPos}</span>`:''}
      ${ydayHtml}${sinceHtml}
      ${yesterdayResults.hasOwnProperty(p.name)?`<span class="p-hit-badge ${yesterdayResults[p.name]?'hit':'miss'}">${yesterdayResults[p.name]?'✓ HR':'✗'}</span>`:''}
    </div>
    <div class="p-sub">${p.HR}HR · ${p.hrPct.toFixed(1)}% · Bats ${p.bats}${form7?`<span style="color:var(--amber);margin-left:4px">${form7}</span>`:''}${p.hotStreak?' · 🔥':''}</div>
    ${h2hHtml}
    ${pitchChips ? `<div style="display:flex;gap:2px;flex-wrap:wrap;margin-top:2px">${pitchChips}</div>` : ''}
    <div class="p-edges">${edges.map(e=>`<span class="edge ${e.t}">${e.l}</span>`).join('')}</div>
  </td>
  <!-- SCORE -->
  <td class="td-score" style="text-align:center;padding:6px 8px">
    <div class="score-wrap">
      <div class="score-num score-${p.tier}" style="font-size:20px">${p.score}</div>
      ${tipHtml}
    </div>
    <span class="tier-badge t${p.tier}">${p.tier}</span>
    <div class="prob-bar" style="margin:3px auto 0"><div class="prob-fill" style="width:${probWidth}%"></div></div>
  </td>
  <!-- HR FORM -->
  <td class="kst ${formCls}" style="font-size:13px">${formScore > 0 ? `${formScore}%` : '—'}<br><span class="kl" style="font-size:9px">${formScore > 0 ? formArrow : ''}</span></td>
  <!-- ISO -->
  ${kCell(p.ISO, v => '.'+String(Math.round(v*1000)).padStart(3,'0'), .220, .155)}
  <!-- xwOBA -->
  ${kCell(p.xwOBA, v => '.'+String(Math.round(v*1000)).padStart(3,'0'), .360, .310)}
  <!-- Brl/BIP% -->
  ${kCell(p.barrel, v => v.toFixed(1)+'%', 10, 6)}
  <!-- SwStr% (inverted: lower = better) -->
  ${kCell(p.whiffPct, v => v.toFixed(0)+'%', 20, 27, true)}
  <!-- Sweet Spot% -->
  ${kCell(p.sweetSpot, v => v.toFixed(0)+'%', 38, 33)}
  <!-- FB% -->
  ${kCell(p.flyBall, v => v.toFixed(0)+'%', 38, 32)}
  <!-- HH% -->
  ${kCell(p.hardHit, v => v.toFixed(0)+'%', 48, 38)}
  <!-- Launch Angle -->
  ${laCell(p.la)}
</tr>`;
}

// ═══════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════
function render() {
  renderInjuryBar();
  renderPicks();

  const isPitchers = activeTab === 'pitchers';
  document.getElementById('pitchersPanel').style.display = isPitchers ? '' : 'none';

  if(isPitchers) { renderPitchersTab(); document.getElementById('board').innerHTML=''; return; }

  if(!activeGames.length) {
    document.getElementById('board').innerHTML='<div class="no-games-msg">NO GAMES SCHEDULED FOR THIS DATE</div>';
    return;
  }

  renderBoardWithStrip();
}

function filterPlayers(players) {
  let f = [...players];
  if(activeTab==='stars')   f = f.filter(p=>p.score>=80);
  if(activeTab==='good')    f = f.filter(p=>p.score>=65);
  if(activeTab==='hot')     f = f.filter(p=>p.hotStreak);
  if(activeTab==='platoon') f = f.filter(p=>p.platoon>=8);
  if(searchQ){ const q=searchQ.toLowerCase(); f=f.filter(p=>p.name.toLowerCase().includes(q)||(p.team||'').toLowerCase().includes(q)); }
  return f;
}

function renderBoardWithStrip() {
  const eraC = era => era<=3.5?'good':era>=4.5?'bad':'mid';

  // Only include games with qualifying players (for filter tabs)
  const qualifyingGames = activeGames.filter(g => {
    if(activeTab==='soon' && !gameStartsWithin3Hours(g)) return false;
    if(activeTab==='all' || activeTab==='soon') return true;
    return filterPlayers(buildPlayers(g)).length > 0;
  });

  if(!qualifyingGames.length) {
    document.getElementById('board').innerHTML='<div class="no-games-msg">NO PLAYERS MATCH THIS FILTER — TRY "ALL" TAB</div>';
    return;
  }

  // Reset selection if stale
  if(!selectedBoardGame || !qualifyingGames.find(g=>g.id===selectedBoardGame)) {
    selectedBoardGame = qualifyingGames[0].id;
  }

  const stripHtml = qualifyingGames.map(g => {
    const ap=g.ap||{}, hp=g.hp||{};
    const active = g.id===selectedBoardGame ? ' active' : '';
    return `<div class="pm-card${active}" onclick="selectBoardGame('${g.id}')">
      <div class="pm-matchup">${g.aw} @ ${g.hm}</div>
      <div class="pm-time">${g.time}</div>
      <div class="pm-pitchers">
        <div class="pm-pitcher"><span class="pm-team">${g.aw}</span><span class="pm-pname">${ap.n||'TBD'}</span><span class="pm-pera ${eraC(ap.era||4.5)}">${ap.n&&ap.n!=='TBD'?ap.era.toFixed(2):'—'}</span></div>
        <div class="pm-pitcher"><span class="pm-team">${g.hm}</span><span class="pm-pname">${hp.n||'TBD'}</span><span class="pm-pera ${eraC(hp.era||4.5)}">${hp.n&&hp.n!=='TBD'?hp.era.toFixed(2):'—'}</span></div>
      </div>
    </div>`;
  }).join('');

  const selGame = qualifyingGames.find(g=>g.id===selectedBoardGame) || qualifyingGames[0];
  const gamePlayers = filterPlayers(buildPlayers(selGame));
  const wx = activeWX[selGame.id]||{};
  const lockBadge = lockBadgeHtml(selGame);
  const condBadgesHtml = condBadges(selGame);

  const detailHtml = `<div class="bd-wrap">
    <div class="bd-game-hd">
      <div class="bd-matchup">${selGame.aw} <span style="color:var(--muted)">@</span> ${selGame.hm}</div>
      <div class="bd-meta">${selGame.time} · ${selGame.venue||''}</div>
      <div class="bd-badges">${lockBadge}${condBadgesHtml}${wx.dome?'<span class="gc-live">DOME</span>':''}</div>
    </div>
    <div class="gc-pm-row">
      ${pitcherMatchupCard(selGame.ap, selGame.aw)}
      ${pitcherMatchupCard(selGame.hp, selGame.hm)}
    </div>
    ${gamePlayers.length ? renderGameDetail(selGame, gamePlayers) : '<div class="no-games-msg" style="padding:20px 0">NO PLAYERS MATCH THIS FILTER FOR THIS GAME</div>'}
  </div>`;

  document.getElementById('board').innerHTML = `<div class="pm-strip">${stripHtml}</div>${detailHtml}`;
}

function selectBoardGame(id) {
  selectedBoardGame = id;
  render();
}

function setSort(col) {
  if(sortCol===col) sortDir = sortDir==='desc'?'asc':'desc';
  else { sortCol=col; sortDir='desc'; }
  render();
}

function scrollToGame(id) {
  if(!id) return;
  expandedGames.add(id);
  render();
  setTimeout(()=>{ const el=document.getElementById(`gc-${id}`); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); },60);
}

function toggleGame(id) {
  expandedGames.has(id) ? expandedGames.delete(id) : expandedGames.add(id);
  render();
}

// ═══════════════════════════════════════════════════
// PITCHERS TAB
// ═══════════════════════════════════════════════════
let selectedPitcherGame = null;
let selectedBoardGame   = null;

function renderPitchersTab() {
  const el = document.getElementById('pitchersPanel');
  if(!activeGames.length){ el.innerHTML='<div class="no-games-msg">NO GAMES SCHEDULED</div>'; return; }

  const games = activeGames.filter(g => (g.ap&&g.ap.n!=='TBD') || (g.hp&&g.hp.n!=='TBD'));
  if(!games.length){ el.innerHTML='<div class="no-games-msg">NO PITCHER DATA AVAILABLE</div>'; return; }

  if(!selectedPitcherGame) selectedPitcherGame = games[0].id;

  const M = 'font-family:\'JetBrains Mono\',monospace';

  function kstCell(val, lbl, gMin, aMin, inv=false, fmt=null) {
    if(!val){ return `<div class="pc-stat"><span class="pc-sv" style="color:var(--dim)">—</span><span class="pc-sl">${lbl}</span></div>`; }
    const cls = inv ? (val<=gMin?'kg':val<=aMin?'ka':'kr') : (val>=gMin?'kg':val>=aMin?'ka':'kr');
    const display = fmt ? fmt(val) : (val < 10 ? val.toFixed(2) : val.toFixed(1));
    return `<div class="pc-stat"><span class="pc-sv ${cls}">${display}</span><span class="pc-sl">${lbl}</span></div>`;
  }

  function eraColorClass(era) {
    return era <= 3.5 ? 'good' : era >= 4.5 ? 'bad' : 'mid';
  }

  // Matchup selector strip cards
  const stripHtml = games.map(g => {
    const ap = g.ap||{}; const hp = g.hp||{};
    const active = g.id === selectedPitcherGame ? ' active' : '';
    const apEraC = eraColorClass(ap.era||4.50);
    const hpEraC = eraColorClass(hp.era||4.50);
    return `<div class="pm-card${active}" onclick="selectPitcherGame('${g.id}')">
      <div class="pm-matchup">${g.aw} @ ${g.hm}</div>
      <div class="pm-time">${g.time}</div>
      <div class="pm-pitchers">
        <div class="pm-pitcher">
          <span class="pm-team">${g.aw}</span>
          <span class="pm-pname">${ap.n||'TBD'}</span>
          <span class="pm-pera ${apEraC}">${ap.n&&ap.n!=='TBD' ? ap.era.toFixed(2) : '—'}</span>
        </div>
        <div class="pm-pitcher">
          <span class="pm-team">${g.hm}</span>
          <span class="pm-pname">${hp.n||'TBD'}</span>
          <span class="pm-pera ${hpEraC}">${hp.n&&hp.n!=='TBD' ? hp.era.toFixed(2) : '—'}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  function pitcherCard(p, team, opp, isHome) {
    if(!p || p.n === 'TBD') return `<div class="pc-card"><div class="pc-name" style="color:var(--muted);padding:20px 0">TBD</div></div>`;
    const vel = (p.vel && p.vel !== 92.5) ? p.vel : null;
    const hand = p.h || 'R';

    // Arsenal — sort by usage%, take top 5
    const pitchTypes = Object.entries(p.arsenal||{})
      .filter(([,v]) => v.pct > 0)
      .sort((a,b) => b[1].pct - a[1].pct)
      .slice(0, 5);

    const arsenalHtml = pitchTypes.length ? pitchTypes.map(([pt, v]) => {
      const wc = (v.whiff_pct||0) >= 30 ? 'kg' : (v.whiff_pct||0) >= 20 ? 'ka' : 'kr';
      const rc = (v.run_val_100||0) <= -1 ? 'kr' : (v.run_val_100||0) <= 1 ? 'ka' : 'kg';
      const xwc = (v.xwoba_against||0) > 0 ? (v.xwoba_against < .290 ? 'kg' : v.xwoba_against < .340 ? 'ka' : 'kr') : '';
      return `<div class="pc-pitch">
        <span class="pc-pt">${pt}</span>
        <span class="pc-pn">${v.name}</span>
        <span class="pc-pct">${v.pct.toFixed(0)}%</span>
        <span class="kst ${wc}" style="font-size:10px;padding:2px 5px;min-width:0">${v.whiff_pct ? v.whiff_pct.toFixed(0)+'%w' : '—'}</span>
        <span class="kst ${xwc}" style="font-size:10px;padding:2px 5px;min-width:0">${v.xwoba_against ? '.'+String(Math.round(v.xwoba_against*1000)).padStart(3,'0') : '—'}</span>
        <span class="kst ${rc}" style="font-size:10px;padding:2px 5px;min-width:0">${v.run_val_100 != null ? (v.run_val_100 > 0 ? '+' : '')+v.run_val_100.toFixed(1)+'rv' : '—'}</span>
      </div>`;
    }).join('') : `<div style="${M};font-size:8px;color:var(--dim);padding:4px 0">No pitch data yet</div>`;

    const starts = (p.starts||[]).slice(0,5);
    const startsHtml = starts.length ? starts.map(s => {
      const c = s.quality==='good'?'var(--green)':s.quality==='bad'?'var(--red)':'var(--amber)';
      const ipFmt = s.ip % 1 === 0 ? `${s.ip}.0` : s.ip;
      const hrBadge = s.hr > 0 ? `<span style="color:var(--red)"> ${s.hr}HR</span>` : '';
      return `<div class="pc-start">
        <span style="color:var(--muted);width:48px;flex-shrink:0">${(s.date||'').slice(5)}</span>
        <span style="color:var(--sub);width:26px;flex-shrink:0">@${s.opp}</span>
        <span style="color:${c};font-weight:700;width:32px;flex-shrink:0">${ipFmt}IP</span>
        <span style="color:${c};font-weight:700">${s.er}ER${hrBadge}</span>
        <span style="color:var(--muted);margin-left:auto">${s.k}K·${s.bb}BB·${s.pc}p</span>
      </div>`;
    }).join('') : `<div style="${M};font-size:8px;color:var(--dim);padding:4px 0">No starts yet</div>`;

    const fatigueBadge = p.fatigued ? `<span class="cbdg" style="background:rgba(239,68,68,.15);color:var(--red);border-color:rgba(239,68,68,.3)">FATIGUED</span>` : '';
    const restBadge = p.daysRest > 0 ? `<span style="${M};font-size:8px;color:var(--muted)">${p.daysRest}d rest · ${p.lastPitches||0}p last</span>` : '';

    return `<div class="pc-card">
      <div class="pc-head">
        <div>
          <div class="pc-name">${p.n}</div>
          <div class="pc-meta">${team} · ${hand}HP · ${isHome?'HOME':'AWAY'} vs ${opp}</div>
          <div style="display:flex;align-items:center;gap:6px;margin-top:4px">${fatigueBadge}${restBadge}</div>
        </div>
        ${vel ? `<div class="pc-vel">${vel}<span style="font-size:9px;color:var(--muted)">mph</span></div>` : ''}
      </div>

      <div class="pc-section-lbl">SEASON RESULTS</div>
      <div class="pc-stats-row">
        ${kstCell(p.era,       'ERA',     3.0, 4.0, true,  v => v.toFixed(2))}
        ${kstCell(p.fip||0,    'FIP',     3.0, 4.2, true,  v => v.toFixed(2))}
        ${kstCell(p.xera||0,   'xERA',    3.0, 4.2, true,  v => v.toFixed(2))}
        ${kstCell(p.recentEra, 'REC.ERA', 3.0, 4.2, true,  v => v.toFixed(2))}
        ${kstCell(p.whip,      'WHIP',    1.1, 1.3, true,  v => v.toFixed(2))}
        ${kstCell(p.k9,        'K/9',     10,  8,   false, v => v.toFixed(1))}
        ${kstCell(p.bb9,       'BB/9',    0,   3.5, true,  v => v.toFixed(1))}
        ${kstCell(p.kPct||0,   'K%',      28,  22,  false, v => v.toFixed(0)+'%')}
        ${kstCell(p.bbPct||0,  'BB%',     0,   8,   true,  v => v.toFixed(0)+'%')}
      </div>

      <div class="pc-section-lbl">COMMAND & EFFICIENCY</div>
      <div class="pc-stats-row">
        ${kstCell(p.strikePct||0,  'STRK%',   68, 62, false, v => v.toFixed(0)+'%')}
        ${kstCell(p.pitchPerIP||0, 'P/IP',    0,  16, true,  v => v.toFixed(1))}
        ${kstCell(p.ip||0,         'IP',      80, 50, false, v => v.toFixed(1))}
        ${kstCell(p.gs||0,         'GS',      0,  0,  false, v => v.toFixed(0))}
      </div>

      <div class="pc-section-lbl">CONTACT QUALITY ALLOWED</div>
      <div class="pc-stats-row">
        ${kstCell(p.xwoba_against||0,      'xwOBA',  0, .290, true, v => '.'+String(Math.round(v*1000)).padStart(3,'0'))}
        ${kstCell(p.barrel_allowed||0,     'Brl%',   0, 6,    true, v => v.toFixed(1)+'%')}
        ${kstCell(p.hard_hit_allowed||0,   'HH%',    0, 38,   true, v => v.toFixed(0)+'%')}
        ${kstCell(p.avg_ev_against||0,     'AvgEV',  0, 89,   true, v => v.toFixed(1))}
        ${kstCell(p.sweet_spot_against||0, 'Sweet%', 0, 36,   true, v => v.toFixed(0)+'%')}
      </div>

      <div class="pc-section-lbl">PITCH ARSENAL</div>
      <div class="pc-arsenal">${arsenalHtml}</div>

      <div class="pc-section-lbl">LAST ${starts.length} STARTS</div>
      <div class="pc-starts">${startsHtml}</div>
    </div>`;
  }

  const selGame = games.find(g => g.id === selectedPitcherGame) || games[0];
  const detailHtml = `<div class="pc-game">
    <div class="pc-game-hd">
      <span class="pc-game-matchup">${selGame.aw} @ ${selGame.hm}</span>
      <span class="pc-game-meta">${selGame.time} · ${selGame.venue}</span>
    </div>
    <div class="pc-cols">
      ${pitcherCard(selGame.ap, selGame.aw, selGame.hm, false)}
      ${pitcherCard(selGame.hp, selGame.hm, selGame.aw, true)}
    </div>
  </div>`;

  el.innerHTML = `<div class="pm-strip">${stripHtml}</div><div class="pc-detail">${detailHtml}</div>`;
}

function selectPitcherGame(gameId) {
  selectedPitcherGame = gameId;
  renderPitchersTab();
}

// ROW CLICK (no-op — parlay slip removed)
// ═══════════════════════════════════════════════════
function handleRowClick(el) {}
function handlePhotoClick(el, event) { event.stopPropagation(); }



// ═══════════════════════════════════════════════════
// DATE NAV
// ═══════════════════════════════════════════════════
function shiftDay(d) {
  const nd = new Date(currentDate); nd.setDate(nd.getDate()+d);
  currentDate=nd; loadDay(currentDate);
}
function goToday() {
  currentDate=new Date(); currentDate.setHours(0,0,0,0); loadDay(currentDate);
}

// ═══════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════
document.getElementById('filterBar').addEventListener('click', e => {
  const b = e.target.closest('.ftab'); if(!b) return;
  activeTab = b.dataset.tab;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on','on-g'));
  b.classList.add('on');
  expandedGames = new Set();
  selectedBoardGame = null;
  render();
});

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
loadDay(currentDate);
</script>
