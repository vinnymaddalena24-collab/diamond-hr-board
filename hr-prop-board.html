<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIAMOND ⬥ HR Prop Board</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060C18; --surface:#0C1525; --card:#111E32; --card2:#162540;
  --border:#1E3050; --border2:#2A4268;
  --blue:#3B82F6; --blue-dim:#1E40AF;
  --amber:#F59E0B; --green:#10B981; --red:#EF4444;
  --orange:#F97316; --purple:#8B5CF6; --teal:#14B8A6;
  --text:#E2E8F0; --sub:#94A3B8; --muted:#475569; --dim:#1E3050;
  --s:#10B981; --a:#F59E0B; --b:#F97316; --c:#3B82F6; --d:#475569;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh;overflow-x:hidden}
button,a{touch-action:manipulation;-webkit-tap-highlight-color:transparent}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:200;background:rgba(6,12,24,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 20px;gap:14px}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:900;color:#fff;flex-shrink:0}
.logo-name{font-size:14px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.logo-name em{color:var(--blue);font-style:normal}
.hdr-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;display:none}
@media(min-width:600px){.hdr-date{display:block}}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:7px}
/* ── YESTERDAY TRACKING SECTION ── */
.yt-bar{background:rgba(6,12,24,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);font-family:'JetBrains Mono',monospace}
.yt-bar-top{display:flex;align-items:center;gap:10px;padding:5px 20px;font-size:9px;color:var(--muted);letter-spacing:.5px;min-height:26px;flex-wrap:wrap;cursor:pointer;user-select:none}
.yt-bar-top:hover .yt-label{color:var(--text)}
.yt-label{color:var(--sub);text-transform:uppercase;font-weight:700;white-space:nowrap;font-size:8px;letter-spacing:1.5px}
.acc-tracking{font-size:8px;color:var(--muted);letter-spacing:1px;padding:1px 7px;border:1px solid var(--border);border-radius:3px;white-space:nowrap}
.acc-tier{display:inline-flex;align-items:center;gap:4px;padding:1px 6px;border-radius:3px}
.acc-tier.S{background:rgba(251,191,36,.1);color:#fbbf24}
.acc-tier.A{background:rgba(239,68,68,.1);color:var(--red)}
.acc-tier.B{background:rgba(99,102,241,.1);color:#818cf8}
.acc-tier.C{background:rgba(100,116,139,.1);color:var(--sub)}
.acc-frac{font-size:9px;font-weight:700}
/* Game selector strip */
.yt-games{border-top:1px solid var(--border)}
.yt-game-strip{display:flex;gap:8px;overflow-x:auto;padding:10px 16px 8px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.yt-game-strip::-webkit-scrollbar{display:none}
.yt-gcard{flex-shrink:0;width:150px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:9px 11px;cursor:pointer;transition:all .14s}
.yt-gcard:hover{border-color:var(--border2);transform:translateY(-1px)}
.yt-gcard.active{border-color:var(--blue);background:rgba(59,130,246,.07)}
.yt-gcard-matchup{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--text);margin-bottom:3px}
.yt-gcard-hr{font-size:8px;color:var(--green);font-weight:700}
.yt-gcard-total{font-size:7px;color:var(--muted)}
/* Game detail */
.yt-detail{padding:8px 16px 12px}
.yt-team-tabs{display:flex;gap:6px;margin-bottom:8px}
.yt-ttab{font-size:8px;font-weight:700;letter-spacing:1px;padding:4px 12px;border-radius:4px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .12s}
.yt-ttab.on{border-color:var(--blue);background:rgba(59,130,246,.1);color:var(--blue)}
.yt-players{display:flex;flex-direction:column;gap:3px}
.yt-prow{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:5px;background:var(--card);border:1px solid var(--border)}
.yt-prow.hit{border-color:rgba(16,185,129,.4);background:rgba(16,185,129,.05)}
.yt-pname{font-size:12px;font-weight:700;flex:1}
.yt-ptier{font-size:7px;font-weight:700;padding:1px 5px;border-radius:3px}
.yt-ptier.S{background:rgba(251,191,36,.15);color:#fbbf24}
.yt-ptier.A{background:rgba(239,68,68,.12);color:var(--red)}
.yt-ptier.B{background:rgba(99,102,241,.1);color:#818cf8}
.yt-ptier.C{background:rgba(100,116,139,.1);color:var(--sub)}
.yt-pscore{font-size:11px;font-weight:700;width:28px;text-align:right;color:var(--sub)}
.yt-phr{font-size:8px;font-weight:700;padding:2px 7px;border-radius:3px}
.yt-phr.hit{background:rgba(16,185,129,.2);color:var(--green)}
.yt-phr.miss{background:rgba(71,85,105,.15);color:var(--muted)}
.p-hit-badge{font-size:8px;font-weight:700;padding:1px 4px;border-radius:3px;margin-left:4px}
.p-hit-badge.hit{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.35)}
.p-hit-badge.miss{background:rgba(239,68,68,.08);color:rgba(239,68,68,.6);border:1px solid rgba(239,68,68,.2)}
/* Day-before HR tracking */
.p-yday{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;flex-shrink:0;cursor:default}
.p-yday.yday-ohfor{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.4)}
.p-yday.yday-hr{background:rgba(16,185,129,.15);color:var(--green);border:1px solid rgba(16,185,129,.35)}
.p-yday.yday-norm{background:var(--surface);color:var(--muted);border:1px solid var(--border)}
.p-since-hr{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;background:rgba(59,130,246,.1);color:var(--blue);border:1px solid rgba(59,130,246,.3);flex-shrink:0;cursor:default}
.status-pill{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:20px;border:1px solid transparent}
.status-pill.live{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.35);color:var(--green)}
.status-pill.loading{background:rgba(71,85,105,.15);border-color:var(--border);color:var(--muted)}
.status-pill.err{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35);color:var(--red)}
.s-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.icon-btn{background:var(--card);border:1px solid var(--border);color:var(--sub);cursor:pointer;padding:5px 11px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;transition:all .15s}
.icon-btn:hover{border-color:var(--blue);color:var(--blue)}
.date-nav{display:flex;align-items:center;gap:4px}
.dbtn{background:var(--card);border:1px solid var(--border);color:var(--sub);cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.dbtn:hover{border-color:var(--blue);color:var(--blue)}
.dbtn.today{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.45);color:var(--blue);font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;width:auto;padding:0 9px;letter-spacing:1px}

/* ── BEST BETS BANNER ── */
.best-bets{padding:14px 20px;background:linear-gradient(135deg,rgba(6,12,24,.97) 0%,rgba(15,25,50,.97) 100%);border-bottom:1px solid var(--border)}
.best-bets-hd{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:2.5px;color:var(--amber);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.best-bets-hd::after{content:'';flex:1;height:1px;background:linear-gradient(to right,rgba(245,158,11,.3),transparent)}
.best-bets-grid{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.best-bets-grid::-webkit-scrollbar{display:none}
.bb-card{flex-shrink:0;width:200px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 13px;cursor:pointer;transition:all .15s;position:relative;overflow:hidden}
.bb-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.bb-card.rank-1{border-color:rgba(245,158,11,.4);background:linear-gradient(135deg,rgba(245,158,11,.05),var(--card))}
.bb-card.rank-2{border-color:rgba(148,163,184,.25)}
.bb-card.rank-3{border-color:rgba(148,163,184,.15)}
.bb-rank{position:absolute;top:9px;right:10px;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;color:var(--muted)}
.bb-rank.r1{color:var(--amber)}
.bb-photo{width:36px;height:36px;border-radius:50%;background:var(--card2);border:2px solid var(--border);overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.bb-photo img{width:100%;height:100%;object-fit:cover;object-position:top}
.bb-top{display:flex;align-items:center;gap:9px;margin-bottom:8px}
.bb-name{font-size:13px;font-weight:700;line-height:1.2}
.bb-team{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted)}
.bb-score{font-family:'JetBrains Mono',monospace;font-size:26px;font-weight:700;line-height:1}
.bb-tier{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;display:inline-block;margin-top:1px}
.bb-stats{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}
.bb-stat{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted)}
.bb-stat .v{color:var(--sub);font-weight:700}
.bb-reason{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-top:6px;line-height:1.5;border-top:1px solid var(--border);padding-top:5px}
/* ── TOP PICKS STRIP ── */
.picks-strip{border-bottom:1px solid var(--border);background:var(--surface);overflow:hidden;display:flex;align-items:center;height:52px;position:relative}
.picks-strip-label{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:2px;color:var(--muted);white-space:nowrap;padding:0 14px;border-right:1px solid var(--border);height:100%;display:flex;align-items:center;background:var(--surface);z-index:2;flex-shrink:0}
.picks-ticker-wrap{flex:1;overflow:hidden;position:relative}
.picks-ticker-wrap::before,.picks-ticker-wrap::after{content:'';position:absolute;top:0;bottom:0;width:40px;z-index:3;pointer-events:none}
.picks-ticker-wrap::before{left:0;background:linear-gradient(to right,var(--surface),transparent)}
.picks-ticker-wrap::after{right:0;background:linear-gradient(to left,var(--surface),transparent)}
.picks-row{display:flex;gap:0;width:max-content;animation:ticker 32s linear infinite}
.picks-row:hover{animation-play-state:paused}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.picks-hd{display:none}
.pick-card{flex-shrink:0;background:transparent;border-left:1px solid var(--border);padding:0 18px;display:flex;align-items:center;gap:10px;height:52px;cursor:pointer;transition:background .15s;white-space:nowrap}
.pick-card:hover{background:rgba(255,255,255,.03)}
.pick-card.rank1{border-left-color:rgba(245,158,11,.5)}
.pick-photo{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);background:var(--surface);flex-shrink:0;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;font-size:18px}
.pick-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center}
.pick-info{flex:1;min-width:0}
.pick-rank{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:1px}
.pick-rank.gold{color:var(--amber)}
.pick-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pick-sub{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--sub);margin-top:2px}
.pick-score-wrap{text-align:center;flex-shrink:0}
.pick-score{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:26px;line-height:1}
.pick-tier-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:1px;margin-top:2px}
.pick-prob{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-top:1px}
.cS .pick-score,.cS .pick-tier-lbl{color:var(--s)}
.cA .pick-score,.cA .pick-tier-lbl{color:var(--a)}
.cB .pick-score,.cB .pick-tier-lbl{color:var(--b)}
.cC .pick-score,.cC .pick-tier-lbl{color:var(--c)}

/* ── FILTER BAR ── */
.filter-bar{display:flex;align-items:center;gap:5px;padding:8px 20px;border-bottom:1px solid var(--border);background:rgba(6,12,24,.97);backdrop-filter:blur(8px);position:sticky;top:56px;z-index:100;overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
.filter-bar::-webkit-scrollbar{display:none}
.ftab{flex-shrink:0;padding:5px 13px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;cursor:pointer;border-radius:6px;transition:all .12s;white-space:nowrap}
.ftab:hover{border-color:var(--blue);color:var(--text)}
.ftab.on{background:var(--blue);border-color:var(--blue);color:#fff}
.ftab.on-g{background:var(--green);border-color:var(--green);color:#fff}
.fb-div{width:1px;height:18px;background:var(--border);flex-shrink:0;margin:0 2px}
.fb-search{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 10px;font-family:'JetBrains Mono',monospace;font-size:9px;border-radius:6px;outline:none;width:140px;flex-shrink:0;margin-left:auto}
.fb-search:focus{border-color:var(--blue)}
.fb-search::placeholder{color:var(--muted)}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 56px)}
.main-col{flex:1;min-width:0;padding:14px 20px}
.games-grid{display:flex;flex-direction:column;gap:10px;max-width:960px}
/* Board detail (strip → detail layout) */
.bd-wrap{padding:12px 0 0;max-width:960px}
.bd-game-hd{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.bd-matchup{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;letter-spacing:1px}
.bd-meta{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sub)}
.bd-badges{display:flex;gap:4px;flex-wrap:wrap;align-items:center;margin-left:auto}

/* ── GAME CARD ── */
.game-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .15s}
.game-card:hover{border-color:var(--border2)}
.game-card.expanded{border-color:var(--blue)}
.gc-head{padding:12px 16px 10px;cursor:pointer;user-select:none}
/* Row 1: matchup + conditions + toggle */
.gc-hdr1{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
.gc-hdr-left{flex-shrink:0}
.gc-matchup{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;letter-spacing:1px}
.gc-meta{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sub);margin-top:2px}
.gc-hdr-conds{display:flex;gap:4px;flex-wrap:wrap;flex:1;align-items:center}
.gc-toggle{flex-shrink:0;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--blue);white-space:nowrap;display:flex;align-items:center;gap:6px}
.gc-live{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.3);flex-shrink:0}
.lock-badge{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:2px 8px;border-radius:4px;flex-shrink:0;letter-spacing:.3px}
.lock-badge.soon{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.4);color:var(--amber)}
.lock-badge.imminent{background:rgba(239,68,68,.14);border:1px solid rgba(239,68,68,.45);color:var(--red);animation:pulse 1.2s ease-in-out infinite}
.lock-badge.locked{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:var(--red)}
/* Row 2: pitcher pills */
.gc-pm-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
@media(max-width:540px){.gc-pm-row{grid-template-columns:1fr}}
.gc-pm-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px}
.gc-pm-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.gc-pm-team{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;background:var(--card2);border:1px solid var(--border);padding:1px 5px;border-radius:3px;color:var(--sub);margin-right:5px}
.gc-pm-name{font-size:13px;font-weight:700;color:var(--text)}
.gc-pm-hand{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-left:5px}
.gc-pm-vel{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;color:var(--blue);white-space:nowrap}
.gc-pm-stats{display:flex;gap:8px;flex-wrap:wrap}
.gc-pm-stat{text-align:center}
.gc-pm-sv{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;display:block;padding:2px 5px;border-radius:3px}
.gc-pm-sv.danger{background:rgba(239,68,68,.12);color:var(--red)}
.gc-pm-sv.elite{background:rgba(16,185,129,.12);color:var(--green)}
.gc-pm-sv.mid{background:rgba(245,158,11,.1);color:var(--amber)}
.gc-pm-sl{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--muted);display:block;letter-spacing:.5px;margin-top:1px}
.gc-pm-dots{margin-top:5px}
.pp-tm{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;color:var(--muted);width:24px;flex-shrink:0}
.pp-nm{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pp-era{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;flex-shrink:0}
.pp-era.danger{color:var(--red)} .pp-era.elite{color:var(--green)} .pp-era.mid{color:var(--amber)}
.pp-vel{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sub);flex-shrink:0}
.pp-hand{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);flex-shrink:0}
.pp-dots{display:flex;gap:2px;flex-shrink:0}
.pp-dot{width:6px;height:6px;border-radius:50%}
/* Condition badges */
.cbdg{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:4px;border:1px solid transparent}
.cbdg.wo{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--amber)}
.cbdg.wi{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);color:var(--blue)}
.cbdg.wc{background:var(--surface);border-color:var(--border);color:var(--muted)}
.cbdg.pf-hi{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red)}
.cbdg.pf-lo{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);color:var(--blue)}
.cbdg.pf-md{background:var(--surface);border-color:var(--border);color:var(--sub)}
.cbdg.tot{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.3);color:var(--purple)}
.cbdg.ump{background:var(--surface);border-color:var(--border);color:var(--muted)}
.cbdg.tmp{background:var(--surface);border-color:var(--border);color:var(--sub)}
.cbdg.stk{background:rgba(139,92,246,.12);border-color:rgba(139,92,246,.45);color:var(--purple);animation:pulse 1.8s ease-in-out infinite}
.cbdg.tbd{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.4);color:var(--red)}
/* trend arrows */
.trend-up2{color:#10B981;font-size:10px;font-weight:700} .trend-up1{color:#34d399;font-size:10px}
.trend-dn1{color:#F59E0B;font-size:10px} .trend-dn2{color:#EF4444;font-size:10px;font-weight:700}
/* score tooltip redesign */
.stip-bar-wrap{margin:2px 0 4px}
.stip-bar-row{display:flex;align-items:center;gap:6px;padding:1.5px 0;font-family:'JetBrains Mono',monospace;font-size:8px}
.stip-bar-lbl{color:var(--sub);width:90px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stip-bar-track{flex:1;height:4px;border-radius:2px;background:var(--border);position:relative;min-width:60px}
.stip-bar-fill{height:100%;border-radius:2px;position:absolute;top:0}
.stip-bar-fill.pos{background:var(--green)}
.stip-bar-fill.neg{background:var(--red);right:0}
.stip-bar-val{font-weight:700;width:24px;text-align:right;flex-shrink:0}
.stip-bar-val.pos{color:var(--green)} .stip-bar-val.neg{color:var(--red)}
/* PrizePicks badge */

/* ── GAME DETAIL (expanded) ── */
.gc-detail{border-top:2px solid var(--blue);background:var(--surface)}
.gc-team-tabs{display:flex;gap:0;padding:10px 16px 0;border-bottom:1px solid var(--border)}
.gc-ttab{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1.5px;padding:7px 18px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--muted);cursor:pointer;transition:all .12s;display:flex;align-items:center;gap:6px}
.gc-ttab:hover{color:var(--text)}
.gc-ttab.on{color:var(--blue);border-bottom-color:var(--blue)}
.gc-ttab-ct{font-size:8px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:0 5px;color:var(--muted)}
.gcd-pitcher-strip{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.pitcher-detail-card{flex:1;min-width:170px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.pitcher-detail-card.danger{border-color:rgba(239,68,68,.3)} .pitcher-detail-card.elite{border-color:rgba(16,185,129,.3)}
.pdc-team{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:2px}
.pdc-name{font-size:14px;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.pdc-hand{font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 6px;border-radius:3px;background:var(--surface);border:1px solid var(--border);color:var(--sub)}
.pdc-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.pdc-stat .lbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);display:block}
.pdc-stat .val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}
.pdc-stat .val.danger{color:var(--red)} .pdc-stat .val.elite{color:var(--green)} .pdc-stat .val.mid{color:var(--amber)}
.pdc-form{display:flex;align-items:center;gap:3px}
.pdc-form-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-right:4px}
.pf-dot{width:9px;height:9px;border-radius:50%}

/* ── PITCHER CARDS (Pitchers Tab) ── */
/* Matchup card selector strip */
.pm-strip{display:flex;gap:10px;overflow-x:auto;padding:14px 16px 10px;border-bottom:1px solid var(--border);scrollbar-width:none;-webkit-overflow-scrolling:touch}
.pm-strip::-webkit-scrollbar{display:none}
.pm-card{flex-shrink:0;width:180px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;cursor:pointer;transition:all .15s;position:relative}
.pm-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.pm-card.active{border-color:var(--blue);background:rgba(59,130,246,.07)}
.pm-matchup{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text);margin-bottom:3px}
.pm-time{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-bottom:7px}
.pm-pitchers{display:flex;flex-direction:column;gap:3px}
.pm-pitcher{font-family:'JetBrains Mono',monospace;font-size:8px;display:flex;align-items:center;gap:5px}
.pm-pitcher .pm-team{color:var(--muted);width:22px;flex-shrink:0}
.pm-pitcher .pm-pname{color:var(--sub);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pm-pitcher .pm-pera{font-weight:700}
.pm-pitcher .pm-pera.good{color:var(--green)}
.pm-pitcher .pm-pera.bad{color:var(--red)}
.pm-pitcher .pm-pera.mid{color:var(--amber)}
/* Expanded pitcher detail area */
.pc-detail{padding:16px 20px}
.pc-game{margin-bottom:20px;border:1px solid var(--border);border-radius:10px;overflow:hidden}
.pc-game-hd{padding:10px 16px;background:rgba(6,12,24,.8);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
.pc-game-matchup{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;letter-spacing:2px;color:var(--text)}
.pc-game-meta{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-left:auto}
.pc-cols{display:grid;grid-template-columns:1fr 1fr;gap:0}
@media(max-width:768px){.pc-cols{grid-template-columns:1fr}}
.pc-card{padding:14px 16px;border-right:1px solid var(--border)}
.pc-card:last-child{border-right:none}
.pc-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.pc-name{font-size:15px;font-weight:700;margin-bottom:2px}
.pc-meta{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted)}
.pc-vel{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--blue);text-align:right}
.pc-section-lbl{font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:10px 0 5px;border-top:1px solid var(--border);padding-top:8px}
.pc-stats-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:2px}
.pc-stat{text-align:center;min-width:50px}
.pc-sv{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;display:block;padding:3px 6px;border-radius:4px}
.pc-sv.kg{background:rgba(16,185,129,.13);color:#34d399}
.pc-sv.ka{background:rgba(245,158,11,.13);color:#f59e0b}
.pc-sv.kr{background:rgba(239,68,68,.13);color:#f87171}
.pc-sl{font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--muted);display:block;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.pc-arsenal{display:flex;flex-direction:column;gap:3px}
.pc-pitch{display:flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:9px;padding:3px 0;border-bottom:1px solid rgba(30,48,80,.5)}
.pc-pt{font-size:8px;font-weight:700;background:var(--card2);border:1px solid var(--border);padding:1px 4px;border-radius:3px;color:var(--blue);width:24px;text-align:center;flex-shrink:0}
.pc-pn{color:var(--sub);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:8px}
.pc-pct{color:var(--muted);width:28px;text-align:right;flex-shrink:0;font-size:9px}
.pc-starts{display:flex;flex-direction:column;gap:2px}
.pc-start{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 0;border-bottom:1px solid rgba(30,48,80,.5)}

/* ── PLAYER TABLE ── */
.pt-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
table.pt{width:100%;border-collapse:collapse;min-width:820px}
table.pt th{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:7px 10px;border-bottom:1px solid var(--border);background:rgba(6,12,24,.6);text-align:left;white-space:nowrap;cursor:pointer;transition:color .1s;user-select:none}
table.pt th:hover{color:var(--blue)}
table.pt th.r{text-align:right}
table.pt th.c{text-align:center;padding:7px 6px}
/* Kasper-style heat-map stat cells */
.kst{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;text-align:center;padding:6px 8px;white-space:nowrap;min-width:54px;color:var(--sub);vertical-align:middle}
.kst .kl{font-size:7px;letter-spacing:.5px;display:block;font-weight:400;color:var(--muted);margin-top:1px;text-transform:uppercase}
.kst.kg{background:rgba(16,185,129,.13);color:#34d399}
.kst.ka{background:rgba(245,158,11,.13);color:#f59e0b}
.kst.kr{background:rgba(239,68,68,.13);color:#f87171}
/* Per-team section header inside game table */
.tm-hd td{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:2px;color:var(--muted);padding:5px 10px 3px;text-transform:uppercase;border-top:1px solid var(--border);background:rgba(6,12,24,.55)}
/* Compact edge chips inside player cell */
.p-edges{display:flex;flex-wrap:wrap;gap:2px;margin-top:3px}
.th-sort{margin-left:3px;opacity:.4}
.th-sort.asc::after{content:'↑'} .th-sort.desc::after{content:'↓'}
.section-row td{padding:4px 10px 3px!important;background:rgba(6,12,24,.7);font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);border-top:1px solid var(--border)}
.pr{cursor:pointer;border-bottom:1px solid var(--dim);transition:background .07s}
.pr:hover .p-photo{border-color:var(--blue)!important}
.pr:hover{background:rgba(59,130,246,.04)}
.pr.sel{background:rgba(245,158,11,.07)}
.pr.sel .sel-dot{background:var(--amber)!important;border-color:var(--amber)!important}
.pr td{padding:6px 10px;vertical-align:middle}

/* Photo cell */
.td-ph{width:52px;padding:5px 4px 5px 10px!important}
.p-photo-wrap{position:relative;width:38px;height:38px}
.p-photo{width:38px;height:38px;border-radius:50%;background:var(--card2);border:2px solid var(--border);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;font-size:15px}
.p-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center}
.sel-dot{position:absolute;top:-2px;right:-2px;width:11px;height:11px;border-radius:50%;background:var(--dim);border:2px solid var(--surface);transition:all .12s}

/* Player name cell */
.td-player{min-width:150px}
.p-name{font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.p-team{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--card2);color:var(--text);flex-shrink:0}
.p-pos{font-family:'JetBrains Mono',monospace;font-size:8px;padding:1px 5px;border-radius:3px;background:var(--surface);border:1px solid var(--border);color:var(--sub);flex-shrink:0}
.p-ord{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--green);flex-shrink:0}
.p-sub{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--sub);margin-top:2px}

/* Matchup cell */
.td-vs{min-width:130px}
.vs-pitcher{font-size:11px;font-weight:600}
.vs-era{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sub)}
.vs-h2h{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--green);margin-top:2px}

/* Stat cells */
.td-num{font-family:'JetBrains Mono',monospace;font-size:12px;text-align:right;color:var(--sub);white-space:nowrap;min-width:60px}
.td-num .big{font-size:13px;font-weight:700;color:var(--text);display:block}
.td-num .sml{font-size:9px;color:var(--muted)}
.hi-green{color:var(--green)!important;font-weight:700!important}
.hi-amber{color:var(--amber)!important;font-weight:700!important}

/* Edges cell */
.td-edges{min-width:140px}
.edges{display:flex;flex-wrap:wrap;gap:3px}
.edge{font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:700;padding:1px 5px;border-radius:3px;border:1px solid transparent;white-space:nowrap}
.edge.pos{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--green)}
.edge.neg{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red)}
.edge.neu{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--amber)}
.edge.inf{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.3);color:var(--purple)}
.edge.dat{background:var(--card2);border-color:var(--border);color:var(--sub)}

/* Score cell */
.td-score{text-align:right;padding-right:12px!important;min-width:72px}
.score-wrap{position:relative;display:inline-block}
.score-num{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;line-height:1;cursor:help}
.score-S{color:var(--s)} .score-A{color:var(--a)} .score-B{color:var(--b)} .score-C{color:var(--c)} .score-D{color:var(--d)}
.tier-badge{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:1px 5px;border-radius:4px;display:inline-block;margin-top:2px}
.tS{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--s)}
.tA{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--a)}
.tB{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);color:var(--b)}
.tC{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:var(--c)}
.tD{background:var(--card2);border:1px solid var(--border);color:var(--muted)}
.prob-bar{height:3px;background:var(--dim);border-radius:2px;margin-top:3px;width:52px;overflow:hidden;margin-left:auto}
.prob-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--green))}
/* Score breakdown tooltip */
.score-tip{display:none;position:absolute;right:0;bottom:calc(100% + 8px);background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:10px 12px;min-width:190px;z-index:600;box-shadow:0 8px 24px rgba(0,0,0,.55);pointer-events:none}
.score-wrap:hover .score-tip{display:block}
.stip-hd{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:6px;text-transform:uppercase}
.stip-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:2px 0;font-family:'JetBrains Mono',monospace;font-size:9px}
.stip-lbl{color:var(--sub);white-space:nowrap}
.stip-pos{color:var(--green);font-weight:700} .stip-neg{color:var(--red);font-weight:700} .stip-neu{color:var(--muted)}
/* HR prob column */
.td-prob{font-family:'JetBrains Mono',monospace;font-size:12px;text-align:right;color:var(--sub);white-space:nowrap;min-width:52px}

/* Action cell */

/* ── PARLAY SLIP ── */
.slip{width:260px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:56px;height:calc(100vh - 56px);overflow:hidden}
.slip-hd{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid var(--border)}
.slip-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.slip-ct{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;background:var(--blue);color:#fff;padding:2px 8px;border-radius:20px;min-width:22px;text-align:center}
.slip-body{flex:1;overflow-y:auto;padding:9px}
.slip-empty{text-align:center;padding:28px 14px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;line-height:2.2}
.slip-leg{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:6px;padding:8px 10px;margin-bottom:6px;display:flex;align-items:flex-start;gap:6px;animation:sIn .14s ease}
@keyframes sIn{from{opacity:0;transform:translateX(6px)}}
.sl-info{flex:1;min-width:0}
.sl-name{font-size:12px;font-weight:700;line-height:1.2}
.sl-sub{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-top:2px}
.sl-score{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;color:var(--amber);flex-shrink:0}
.sl-rm{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:1px 3px;transition:color .1s}
.sl-rm:hover{color:var(--red)}
.slip-ft{border-top:1px solid var(--border);padding:12px 15px}
.slip-stat{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:3px}
.slip-stat .v{color:var(--text)}
.slip-odds{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--green);margin:4px 0 2px}
.slip-warn{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--amber);min-height:11px;margin-bottom:5px}
.slip-copy{width:100%;background:var(--amber);color:#000;border:none;padding:8px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;border-radius:6px;transition:opacity .1s}
.slip-copy:hover{opacity:.88} .slip-copy:disabled{opacity:.35;cursor:not-allowed}
.slip-clear{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;cursor:pointer;border-radius:6px;margin-top:5px;transition:all .1s}
.slip-clear:hover{border-color:var(--red);color:var(--red)}
.slip-handle{display:none} /* shown via mobile media query */
.slip-mob-close{display:none;background:none;border:none;color:var(--muted);font-size:16px;cursor:pointer;padding:2px 4px;margin-left:auto}
/* ── SLIP BOT ── */
.bot-wrap{padding:11px 13px;border-bottom:1px solid var(--border);background:rgba(6,12,24,.45)}
.bot-label{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-bottom:6px}
.bot-count-row{display:flex;gap:5px}
.bot-cnt{flex:1;background:var(--card);border:1px solid var(--border);color:var(--blue);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:.5px;padding:7px 4px;border-radius:5px;cursor:pointer;transition:all .12s}
.bot-cnt:hover{background:rgba(59,130,246,.14);border-color:var(--blue);transform:translateY(-1px)}
.bot-cnt:active{transform:none}
.bot-grade-row{display:flex;gap:4px;margin-bottom:8px}
.bot-grade{flex:1;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;padding:5px 2px;border-radius:4px;cursor:pointer;transition:all .12s}
.bot-grade.on{background:rgba(59,130,246,.08)}
.bot-grade.t-s.on{border-color:var(--s);color:var(--s);background:rgba(168,85,247,.1)}
.bot-grade.t-a.on{border-color:var(--a);color:var(--a);background:rgba(16,185,129,.1)}
.bot-grade.t-b.on{border-color:var(--b);color:var(--b);background:rgba(59,130,246,.1)}
.bot-grade:not(.t-s):not(.t-a):not(.t-b).on{border-color:var(--border2);color:var(--sub)}
.bot-input-row{display:flex;gap:5px;margin-bottom:5px}
.bot-input{flex:1;min-width:0;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:9px;padding:6px 8px;border-radius:4px;outline:none}
.bot-input::placeholder{color:var(--muted)}
.bot-input:focus{border-color:var(--blue)}
.bot-send{background:var(--blue);border:none;color:#fff;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;padding:6px 11px;border-radius:4px;cursor:pointer;transition:opacity .1s;flex-shrink:0}
.bot-send:hover{opacity:.85}
.bot-msg{font-family:'JetBrains Mono',monospace;font-size:8px;min-height:11px;line-height:1.5;color:var(--green)}

/* ── SEARCH PANEL ── */
.search-panel{padding:20px;display:none}
.search-wrap{display:flex;gap:8px;align-items:center;margin-bottom:14px}
.search-input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:11px;border-radius:8px;outline:none}
.search-input:focus{border-color:var(--blue)}
.search-input::placeholder{color:var(--muted)}
.search-hint{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-bottom:12px}

/* Search result card */
.src-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
.src-main{flex:1;min-width:130px}

/* ── TARGETS / INJURY ── */

/* ── NO SERVER ── */
.no-server{max-width:480px;margin:60px auto;padding:0 20px}
.ns-icon{font-size:36px;margin-bottom:14px}
.ns-title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}

/* ── LOADING / EMPTY ── */

/* ── RESPONSIVE ── */

<script>
'use strict';

// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const API_BASE = (location.protocol === 'file:' || !location.host)
  ? 'http://localhost:8765' : location.origin;
const REFRESH_MS = 15 * 60 * 1000;

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let currentDate = new Date(); currentDate.setHours(0,0,0,0);
let activeTab = 'all', searchQ = '';
let expandedGames = new Set(); // all games expanded by default
let activeGames = [], activeWX = {};
let serverTop5 = [], serverInjuries = [];
let sortCol = 'score', sortDir = 'desc';
let autoRefreshTimer = null;

// ═══════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function displayDate(d) {
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}).toUpperCase();
}
function tierOf(s) { return s>=80?'S':s>=65?'A':s>=50?'B':s>=35?'C':'D'; }
function scoreColor(t) { return {S:'var(--s)',A:'var(--a)',B:'var(--b)',C:'var(--c)',D:'var(--d)'}[t]||'var(--d)'; }
function platAdj(bats, ph) { if(bats==='S') return 4; return bats!==ph?8:-4; }
function eraClass(era) { return era<2.80?'elite':era>4.80?'danger':'mid'; }

function parseGameET(g) {
  const match = (g.time||'').match(/(\d+):(\d+)\s+(AM|PM)/i);
  if (!match) return null;
  let h = parseInt(match[1]), m = parseInt(match[2]);
  const ap = match[3].toUpperCase();
  if (ap === 'PM' && h !== 12) h += 12;
  if (ap === 'AM' && h === 12) h = 0;
  const nowET = new Date(Date.now() - 4 * 3600000);
  const gameET = new Date(nowET); gameET.setHours(h, m, 0, 0);
  return gameET;
}
function minutesToGame(g) {
  const gameET = parseGameET(g); if (!gameET) return 999;
  return Math.round((gameET - new Date(Date.now() - 4*3600000)) / 60000);
}
function gameStartsWithin3Hours(g) {
  const mins = minutesToGame(g);
  return mins >= -30 && mins <= 180;
}
function lockBadgeHtml(g) {
  const mins = minutesToGame(g);
  if (mins <= 0 && mins >= -30) return `<span class="lock-badge locked">⚾ IN PROGRESS</span>`;
  if (mins > 0 && mins <= 10)   return `<span class="lock-badge imminent">🔒 LOCKS ${mins}m</span>`;
  if (mins > 0 && mins <= 45)   return `<span class="lock-badge soon">🔒 LOCKS ${mins}m</span>`;
  return '';
}

function formDots(recentEra, era, fatigued, starts) {
  // Use real per-start lines when available; fall back to ERA estimate
  if (starts && starts.length) {
    return starts.slice(0, 5).map(s => {
      let c, tip;
      if (s.quality === 'good') c = '#10B981';
      else if (s.quality === 'bad') c = '#EF4444';
      else c = '#F59E0B';
      const ipFmt = Number.isInteger(s.ip) ? `${s.ip}.0` : s.ip;
      const hrTxt = s.hr > 0 ? ` · ${s.hr}HR allowed` : '';
      tip = `${s.date || ''} vs ${s.opp} — ${ipFmt}IP ${s.er}ER${hrTxt} (${s.pc}p)`;
      return `<span class="pf-dot" style="background:${c};cursor:help" title="${tip}"></span>`;
    }).join('');
  }
  // Fallback: estimate from rolling ERA
  return [0,1,2,3,4].map(i => {
    const v = recentEra + (i - 2) * 0.2;
    const c = v < 3.50 ? '#10B981' : v < 4.80 ? '#F59E0B' : '#EF4444';
    return `<span class="pf-dot" style="background:${c}"></span>`;
  }).join('');
}

function computeEdges(p, g) {
  const wx = activeWX[g.id] || {};
  const edges = [];
  // Platoon
  const pl = platAdj(p.bats, p.pitcher.h);
  if(pl >= 8)  edges.push({l:'⚡ L/R ADV', t:'pos'});
  if(pl <= -4) edges.push({l:'L/R DISADV', t:'neg'});
  // Hot streak / month
  if(p.hotStreak) edges.push({l:'🔥 HOT 15D', t:'pos'});
  if(p.hotMonth)  edges.push({l:'↑ HOT MONTH', t:'pos'});
  // H2H
  if(p.h2h && p.h2h.hr >= 2) edges.push({l:`${p.h2h.hr}HR H2H`, t:'pos'});
  else if(p.h2h && p.h2h.hr === 1) edges.push({l:`1HR H2H`, t:'pos'});
  else if(p.h2h && p.h2h.ab >= 7 && p.h2h.ops <= 0.450) edges.push({l:'0HR H2H', t:'neg'});
  // Pitcher vuln
  if(p.pitcherFatigued) edges.push({l:'TIRED P', t:'pos'});
  if(p.pitcherEra >= 5.20) edges.push({l:`${p.pitcherEra.toFixed(2)} ERA`, t:'pos'});
  if(p.pitcherBarrelAllowed >= 12) edges.push({l:'P BARRELS', t:'pos'});
  // Wind
  if(!wx.dome) {
    if((wx.w||0) >= 10 && wx.d==='out') edges.push({l:`↑${wx.w}mph OUT`, t:'pos'});
    if((wx.w||0) >= 10 && wx.d==='in')  edges.push({l:`↓${wx.w}mph IN`, t:'neg'});
  }
  // Park
  if(g.pf >= 112) edges.push({l:`PF ${g.pf}`, t:'pos'});
  // Bullpen
  if(p.oppBullpenEra >= 5.0) edges.push({l:'WEAK BP', t:'pos'});
  // Game total
  if(p.gameTotal >= 9.5) edges.push({l:`O/U ${p.gameTotal}`, t:'neu'});
  // Ump
  if(p.umpScore >= 1.0) edges.push({l:'UMP TIGHT', t:'pos'});
  // Barrel power
  if(p.barrel >= 15) edges.push({l:`${p.barrel.toFixed(0)}% BBL`, t:'dat'});
  // Fly ball rate — positive HR indicator
  if((p.flyBall||0) >= 42) edges.push({l:`${p.flyBall.toFixed(0)}% FB`, t:'dat'});
  // K-risk: high whiff batter vs high K pitcher
  const kRisk = (p.whiffPct||0) > 27 && (p.pitcherK9||0) > 10;
  if(kRisk) edges.push({l:`⚠ K RISK`, t:'neg'});
  // Spray/park
  if(p.sprayAdj >= 4) edges.push({l:'🏟 PULL PARK', t:'pos'});
  // Pitch matchup top insight
  if(p.pitchMatchup && p.pitchMatchup.length) {
    const top = p.pitchMatchup.find(m => m.verdict === 'CRUSHES' && m.pct >= 20);
    if(top) edges.push({l:`CRUSHES ${top.name.split(' ')[0]}`, t:'pos'});
    else {
      const bad = p.pitchMatchup.find(m => m.verdict === 'STRUGGLES' && m.pct >= 20);
      if(bad) edges.push({l:`WEAK vs ${bad.name.split(' ')[0]}`, t:'neg'});
    }
  }
  // Day-before HR tracking signals
  if(p.prevOhFor && p.gamesSinceHR > 0) {
    // Went 0-for last game and hasn't homered since — strongest signal
    const pct = p.pctAfterOhFor;
    edges.push({l: pct >= 40 ? `0-FOR YDAY (${pct}%)` : `0-FOR YDAY`, t:'pos'});
  }
  if(!p.prevOhFor && p.gamesSinceHR >= 6) {
    // Long drought — due factor (season avg ~every 5-7g for HR hitters)
    edges.push({l:`${p.gamesSinceHR}G NO HR`, t:'neu'});
  }
  // PrizePicks line — rendered separately as a badge, not an edge chip
  // Confirmed in lineup
  if(p.confirmed && p.lineupPos > 0) edges.push({l:`#${p.lineupPos} LINEUP`, t:'neu'});

  return edges.slice(0, 6);
}


// ═══════════════════════════════════════════════════
// SPRAY CHART — INLINE ROW EXPANSION
// ═══════════════════════════════════════════════════
let playerMap  = {};
let sprayCache = {};        // player.name → events array (null = fetching)
let expandedPlayer = null;
let sprayFilter = {};       // player.name → 'all'|'hr'|'xbh'

// [LF, LC, CF, RC, RF] distances per park
const PARK_WALLS = {
  NYY:[318,399,408,385,314], BOS:[310,379,420,380,302], CHC:[355,368,400,368,353],
  SF: [339,382,399,421,309], LAD:[330,385,400,385,330], COL:[347,390,415,375,350],
  PHI:[329,374,401,369,330], ATL:[335,385,400,390,325], MIA:[344,386,407,392,335],
  NYM:[335,379,408,383,330], PIT:[325,383,399,375,320], CIN:[328,379,404,370,325],

  CLE:[325,370,405,375,325], BAL:[333,364,400,373,318], WSH:[336,377,402,370,335],
  MIL:[344,370,400,374,345], KC: [330,387,410,387,330], LAA:[330,387,400,365,350],
  SD: [336,367,396,391,322], ATH:[333,375,400,362,330], ARI:[330,374,407,376,335],

async function fetchSprayData(player) {
  if (!player.mlbId) { sprayCache[player.name] = []; return; }
  if (sprayCache[player.name] !== undefined) return;
  sprayCache[player.name] = null; // mark fetching
  try {
    const r = await fetch(`${API_BASE}/api/spray?batter_id=${player.mlbId}`, {cache:'no-store'});
    sprayCache[player.name] = await r.json();
  } catch(e) { sprayCache[player.name] = []; }
  // Patch the row in-place without full re-render
  const rowEl = document.getElementById(`spray-row-${player.name.replace(/[^a-zA-Z0-9]/g,'_')}`);
  if (rowEl) rowEl.querySelector('td').innerHTML = buildSprayInner(player, sprayCache[player.name]||[], null);
}

function buildSprayInner(player, events, homeTeam) {
  const photo = player.mlbId ? `<img src="https://img.mlbstatic.com/mlb-photos/image/upload/w_213,d_people:generic:headshot:silo:current.png,q_auto:best,f_auto/v1/people/${player.mlbId}/headshot/67/current">` : '';
  const activeF = sprayFilter[player.name] || 'all';
  const XBH_TYPES = ['home_run','double','triple'];
  const HIT_TYPES = ['home_run','single','double','triple'];
  // Filter events for the SVG — always show all for context; apply for hit list
  const allHrs  = events.filter(e=>e.event==='home_run').length;
  const allHits = events.filter(e=>['single','double','triple'].includes(e.event)).length;
  const allOuts = events.filter(e=>!HIT_TYPES.includes(e.event)).length;
  // For the field SVG, dim non-matching events when filter is active
  const svgEvents = events.map(e => ({...e, dimmed: activeF==='hr' ? e.event!=='home_run' : activeF==='xbh' ? !XBH_TYPES.includes(e.event) : false}));
  // Hit list filtered events
  const listEvents = activeF==='hr' ? events.filter(e=>e.event==='home_run')
                   : activeF==='xbh' ? events.filter(e=>XBH_TYPES.includes(e.event))
                   : events.filter(e=>HIT_TYPES.includes(e.event));
  const hrs  = allHrs;
  const hits = allHits;
  const outs = allOuts;
  const hitList = events.filter(e=>['home_run','single','double','triple'].includes(e.event));
  const sc = (v,hi,lo) => v>=hi?'var(--green)':v>=lo?'var(--amber)':'var(--sub)';
  const stats = player.barrel>0 ? `
    <div class="spray-stat-row">
      <div class="spray-stat"><span class="v" style="color:${sc(player.barrel,14,8)}">${player.barrel.toFixed(1)}%</span><span class="l">BARREL</span></div>
      <div class="spray-stat"><span class="v" style="color:${sc(player.hardHit,48,38)}">${player.hardHit.toFixed(0)}%</span><span class="l">HARD HIT</span></div>
      <div class="spray-stat"><span class="v">${player.avgEV>0?player.avgEV.toFixed(1)+'mph':'—'}</span><span class="l">AVG EV</span></div>
      <div class="spray-stat"><span class="v" style="color:${sc(player.xwOBA,.380,.320)}">${player.xwOBA>0?'.'+String(Math.round(player.xwOBA*1000)).padStart(3,'0'):'—'}</span><span class="l">xwOBA</span></div>
    </div>
    <div class="spray-stat-row">
      <div class="spray-stat"><span class="v" style="color:${sc(player.flyBall||0,42,37)}">${(player.flyBall||0)>0?(player.flyBall||0).toFixed(0)+'%':'—'}</span><span class="l">FLY BALL</span></div>
      <div class="spray-stat"><span class="v" style="color:${(player.whiffPct||0)>30?'var(--red)':(player.whiffPct||0)>26?'var(--amber)':'var(--sub)'}">${(player.whiffPct||0)>0?(player.whiffPct||0).toFixed(0)+'%':'—'}</span><span class="l">WHIFF%</span></div>
      <div class="spray-stat"><span class="v" style="color:${sc(player.sweetSpot||0,40,36)}">${(player.sweetSpot||0)>0?(player.sweetSpot||0).toFixed(0)+'%':'—'}</span><span class="l">SWEET SPOT</span></div>
      <div class="spray-stat"><span class="v" style="color:${(player.pitcherK9||0)>=11?'var(--red)':(player.pitcherK9||0)>=9.5?'var(--amber)':'inherit'}">${(player.pitcherK9||0)>0?(player.pitcherK9||0).toFixed(1):'—'}</span><span class="l">OPP K/9</span></div>
    </div>` : '';
  // ── Pitch matchup section ─────────────────────────────────────────────────
  const pitches = player.pitchMatchup || [];
  const pitchRows = pitches.length ? pitches.map(pm => {
    const v = pm.verdict || 'NO DATA';
    const c = v==='CRUSHES'?'#F59E0B': v==='STRONG'?'#34D399': v==='STRUGGLES'?'#EF4444':'#64748B';
    const bg= v==='CRUSHES'?'rgba(245,158,11,.08)': v==='STRONG'?'rgba(52,211,153,.06)': v==='STRUGGLES'?'rgba(239,68,68,.06)':'transparent';
    const xslg = pm.xslg!=null ? `.${String(Math.round(pm.xslg*1000)).padStart(3,'0')}` : '—';
    const hh   = pm.hard_hit!=null ? `${pm.hard_hit}%` : '—';
    const wf   = pm.whiff!=null ? `${pm.whiff}%` : '';
    const paLbl= pm.pa>0 ? `${pm.pa} PA` : 'No H2H';
    // Usage bar width
    const barW = Math.min(100, pm.pct||0);
    const adj  = pm.adj>0?`+${pm.adj}`:pm.adj<0?`${pm.adj}`:'';
    return `<div style="padding:7px 0;border-bottom:1px solid var(--dim);background:${bg}">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px">
        <span style="font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;color:var(--text);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${pm.name||pm.pt}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:var(--sub)">${pm.pct||0}%</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;background:${bg};color:${c};border:1px solid ${c}40">${v}</span>
        ${adj?`<span style="font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;color:${c}">${adj}</span>`:''}
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div style="flex:1;height:3px;background:var(--dim);border-radius:2px;overflow:hidden">
          <div style="width:${barW}%;height:100%;background:${c};opacity:.6;border-radius:2px"></div>
        </div>
        <span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);white-space:nowrap">xSLG <strong style="color:${c}">${xslg}</strong></span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);white-space:nowrap">HH <strong style="color:${c}">${hh}</strong></span>
        ${wf?`<span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);white-space:nowrap">K-Swing <strong>${wf}</strong></span>`:''}
        <span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--dim);white-space:nowrap">${paLbl}</span>
      </div>
    </div>`;
  }).join('') : `<div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);padding:10px 0;text-align:center">No pitch arsenal data available</div>`;

  // Filter tabs
  const pn = player.name;
  const filterBar = `<div style="display:flex;gap:4px;margin-bottom:8px">
    ${[['all','ALL'],['hr','HRs ONLY'],['xbh','XBH']].map(([val,lbl])=>`<button onclick="setSprayFilter('${pn.replace(/'/g,"\\'")}','${val}')" style="font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:2px 8px;border-radius:4px;cursor:pointer;border:1px solid ${activeF===val?'var(--blue)':'var(--border)'};background:${activeF===val?'rgba(96,165,250,.15)':'transparent'};color:${activeF===val?'var(--blue)':'var(--muted)'}">${lbl}</button>`).join('')}
  </div>`;

  // Hit list
  const evColor = e => e.event==='home_run'?'#F59E0B':e.event==='double'||e.event==='triple'?'#60A5FA':e.event==='single'?'#34D399':'#4a5568';
  const evLabel = e => e.event==='home_run'?'HR':e.event==='double'?'2B':e.event==='triple'?'3B':e.event==='single'?'1B':e.event.replace(/_/g,' ').toUpperCase();
  const hitListHtml = listEvents.length === 0
    ? `<div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);padding:10px 0;text-align:center">No ${activeF==='hr'?'home runs':activeF==='xbh'?'extra-base hits':'hits'} found</div>`
    : listEvents.slice(0,20).map(e=>`<div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid var(--dim)">
        <span style="font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;background:${evColor(e)}22;color:${evColor(e)};border:1px solid ${evColor(e)}44;white-space:nowrap;min-width:22px;text-align:center">${evLabel(e)}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--sub);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${e.pitcher||'—'}</span>
        ${e.ev>0?`<span style="font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;color:${e.ev>=100?'var(--green)':e.ev>=92?'var(--amber)':'var(--sub)'}">${e.ev.toFixed(0)}<span style="opacity:.5">mph</span></span>`:''}
        ${e.la!==0?`<span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted)">${e.la>0?'+':''}${e.la}°</span>`:''}
        ${e.dist>0?`<span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted)">${e.dist}ft</span>`:''}
        <span style="font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--dim);white-space:nowrap">${(e.date||'').slice(5)}</span>
      </div>`).join('');

  return `<div class="spray-wrap">
    <div class="spray-field-col">
      ${filterBar}
      ${fieldSVG(svgEvents, homeTeam)}
      <div class="spray-legend" style="margin-top:8px">
        <div style="font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--muted);width:100%;margin-bottom:4px;letter-spacing:1px">${events.length} CONTACTS · ${hrs} HR THIS SEASON</div>
        <div class="spray-legend-item"><div class="spray-leg-line" style="background:#F59E0B"></div>${hrs} HR</div>
        <div class="spray-legend-item"><div class="spray-leg-line" style="background:#60A5FA"></div>${hits} Hits</div>
        <div class="spray-legend-item"><div class="spray-leg-line" style="background:#475569;opacity:.5"></div>${outs} Outs</div>
      </div>
      <div class="spray-hit-list" style="max-height:160px;overflow-y:auto;margin-top:8px">
        ${hitListHtml}
      </div>
    </div>
    <div class="spray-info-col">
      <div class="spray-player-hd">
        <div class="spray-player-photo">${photo}⚾</div>
        <div>
          <div style="font-size:14px;font-weight:700">${player.name}</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sub)">${player.team} · ${player.pos||''} · Bats ${player.bats}</div>
          <div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-top:2px">vs ${player.pitcher?.n||''} · ${player.pitcher?.era?.toFixed(2)||'—'} ERA · ${player.pitcher?.h||'R'}HP</div>
        </div>
      </div>
      ${stats}
      <div style="font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:2px;color:var(--muted);margin-top:4px;margin-bottom:2px">
        ${player.pitcher?.n||'PITCHER'}'S ARSENAL vs ${player.name.split(' ').pop().toUpperCase()}
      </div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--muted);margin-bottom:6px;opacity:.7">
        Batter's career xSLG vs this pitch type (all pitchers) × pitcher's usage %
      </div>
      <div class="spray-hit-list" style="max-height:240px">
        ${pitchRows}
      </div>
    </div>
  </div>`;
}

function buildSprayRow(player) {
  const safeName = player.name.replace(/[^a-zA-Z0-9]/g,'_');
  const events = sprayCache[player.name];
  // Find home team for this game (for park-specific wall distances)
  const game = activeGames.find(g => g.id === player.gameId);
  const homeTeam = game ? game.hm : '';
  let inner;
  if (events === undefined || events === null) {
    inner = `<div class="spray-wrap"><div style="padding:24px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);display:flex;align-items:center;gap:10px"><span class="spinner"></span>LOADING STATCAST DATA...</div></div>`;
  } else if (events.length === 0) {
    inner = `<div class="spray-wrap"><div style="padding:24px;font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);text-align:center;width:100%">⚾ No Statcast data available for ${player.name} this season</div></div>`;
  } else {
    inner = buildSprayInner(player, events, homeTeam);
  }
  return `<tr class="spray-expand-row" id="spray-row-${safeName}"><td colspan="9">${inner}</td></tr>`;
}

function setSprayFilter(playerName, f) {
  sprayFilter[playerName] = f;
  const safeName = playerName.replace(/[^a-zA-Z0-9]/g,'_');
  const rowEl = document.getElementById(`spray-row-${safeName}`);
  if (!rowEl) return;
  const player = playerMap[playerName];
  const events = sprayCache[playerName] || [];
  const game = activeGames.find(g => g.id === player?.gameId);
  if (player) rowEl.querySelector('td').innerHTML = buildSprayInner(player, events, game ? game.hm : '');
}

function fieldSVG(events, homeTeam) {
  const W=310, H=268, HX=155, HY=248;
  function sc(x,y){ return [(x/250)*310, (y/250)*268]; }
  // Park-specific wall distances
  const w = PARK_WALLS[homeTeam] || [330,365,400,365,330];
  const [dLF,dLC,dCF,dRC,dRF] = w;
  const lines = events.map(ev=>{
    if(!ev.x||!ev.y) return '';
    const [ex,ey]=sc(ev.x,ev.y);
    const isHR=ev.event==='home_run', is2=ev.event==='double', is3=ev.event==='triple', is1=ev.event==='single';
    const isHit=isHR||is2||is3||is1;
    const color=isHR?'#F59E0B':is2||is3?'#60A5FA':is1?'#34D399':'#4a5568';
    const dimmed = ev.dimmed || false;
    const sw=isHR?3:is2||is3?2.2:is1?1.8:1;
    const op=dimmed?'0.06':isHit?'0.85':'0.15';
    const dash=isHit?'':'stroke-dasharray="3 2"';
    const tip=`${ev.event||'out'}${ev.ev?' '+ev.ev+'mph':''}${ev.la?' '+ev.la+'°':''}${ev.dist?' '+ev.dist+'ft':''}${ev.date?' '+ev.date:''}`;
    let ex2=ex,ey2=ey,mark='';
    if(isHR){const dx=ex-HX,dy=ey-HY;ex2=ex+dx*.30;ey2=ey+dy*.30;mark=dimmed?'':(`<circle cx="${ex2.toFixed(1)}" cy="${ey2.toFixed(1)}" r="6" fill="#F59E0B" opacity=".92" filter="url(#fg)"/><circle cx="${ex2.toFixed(1)}" cy="${ey2.toFixed(1)}" r="11" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity=".30"/>`);}
    else if(isHit&&!dimmed){mark=`<circle cx="${ex.toFixed(1)}" cy="${ey.toFixed(1)}" r="${is2||is3?4:3}" fill="${color}" opacity=".82"/>`;}
    return `<g><line x1="${HX}" y1="${HY}" x2="${ex2.toFixed(1)}" y2="${ey2.toFixed(1)}" stroke="${color}" stroke-width="${sw}" opacity="${op}" ${dash}><title>${tip}</title></line>${mark}</g>`;
  }).join('');

  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}" style="border-radius:10px;display:block">
<defs>
  <radialGradient id="bgG" cx="50%" cy="100%" r="100%"><stop offset="0%" stop-color="#1a2e10"/><stop offset="60%" stop-color="#0f1e08"/><stop offset="100%" stop-color="#080e04"/></radialGradient>
  <radialGradient id="dirtG" cx="50%" cy="40%" r="70%"><stop offset="0%" stop-color="#4a2212"/><stop offset="100%" stop-color="#2a1008"/></radialGradient>
  <pattern id="mow" x="0" y="0" width="26" height="26" patternTransform="rotate(-50 ${HX} 130)" patternUnits="userSpaceOnUse"><rect width="13" height="26" fill="#183d0c"/><rect x="13" width="13" height="26" fill="#143308"/></pattern>
  <filter id="fg" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="bshadow"><feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="#000" flood-opacity=".5"/></filter>
</defs>
<rect width="${W}" height="${H}" fill="#060e04"/>
<!-- Sky/foul territory -->
<rect width="${W}" height="${H}" fill="#0a1806" opacity=".9"/>
<!-- Fair territory grass -->
<path d="M ${HX} ${HY} L 8 46 C 55 -15 255 -15 302 46 Z" fill="url(#bgG)"/>
<!-- Mow stripes (clipped visually by fill) -->
<path d="M ${HX} ${HY} L 8 46 C 55 -15 255 -15 302 46 Z" fill="url(#mow)" opacity=".6"/>
<!-- Warning track (outer ring) -->
<path d="M 8 46 C 55 -15 255 -15 302 46 L 292 54 C 246 4 64 4 18 54 Z" fill="#1e0e06"/>
<!-- Inner grass over warning track -->
<path d="M ${HX} ${HY} L 18 54 C 64 4 246 4 292 54 Z" fill="url(#bgG)"/>
<path d="M ${HX} ${HY} L 18 54 C 64 4 246 4 292 54 Z" fill="url(#mow)" opacity=".6"/>
<!-- Outfield wall -->
<path d="M 8 46 C 55 -15 255 -15 302 46" fill="none" stroke="#2d6018" stroke-width="5"/>
<path d="M 8 46 C 55 -15 255 -15 302 46" fill="none" stroke="#4a9428" stroke-width="1.5"/>
<!-- Padding stripe on wall -->
<path d="M 8 46 C 55 -15 255 -15 302 46" fill="none" stroke="rgba(255,255,255,.12)" stroke-width="3" stroke-dasharray="8 8"/>
<!-- Foul lines -->
<line x1="${HX}" y1="${HY}" x2="8" y2="46" stroke="rgba(255,255,255,.55)" stroke-width="1.5"/>
<line x1="${HX}" y1="${HY}" x2="302" y2="46" stroke="rgba(255,255,255,.55)" stroke-width="1.5"/>
<!-- Distance markers -->
<text x="46" y="90" fill="rgba(255,255,255,.25)" font-family="monospace" font-size="9" text-anchor="middle">${dLF}</text>
<text x="${HX}" y="28" fill="rgba(255,255,255,.25)" font-family="monospace" font-size="9" text-anchor="middle">${dCF}</text>
<text x="264" y="90" fill="rgba(255,255,255,.25)" font-family="monospace" font-size="9" text-anchor="middle">${dRF}</text>
<!-- Power alley markers -->
<text x="80" y="52" fill="rgba(255,255,255,.18)" font-family="monospace" font-size="8" text-anchor="middle">${dLC}</text>
<text x="230" y="52" fill="rgba(255,255,255,.18)" font-family="monospace" font-size="8" text-anchor="middle">${dRC}</text>
<!-- Infield dirt -->
<circle cx="${HX}" cy="182" r="76" fill="url(#dirtG)"/>
<!-- Infield grass -->
<circle cx="${HX}" cy="182" r="59" fill="#163810"/>
<circle cx="${HX}" cy="182" r="59" fill="url(#mow)" opacity=".45"/>
<!-- Base paths (dirt strips) -->
<polygon points="${HX},${HY} 210,183 ${HX},116 100,183" fill="#2e1008" opacity=".85"/>
<!-- Pitcher mound -->
<ellipse cx="${HX}" cy="178" rx="14" ry="12" fill="url(#dirtG)"/>
<ellipse cx="${HX}" cy="177" rx="6" ry="5" fill="#3e1a0a"/>
<rect x="149" y="175" width="12" height="4" rx="1.5" fill="rgba(240,236,224,.75)"/>
<!-- HIT LINES (behind bases/plate) -->
${lines}
<!-- Bases (on top) -->
<rect x="203" y="176" width="14" height="14" rx="2" fill="#e8dcc0" transform="rotate(45 210 183)" filter="url(#bshadow)"/>
<rect x="148" y="109" width="14" height="14" rx="2" fill="#e8dcc0" transform="rotate(45 155 116)" filter="url(#bshadow)"/>
<rect x="93" y="176" width="14" height="14" rx="2" fill="#e8dcc0" transform="rotate(45 100 183)" filter="url(#bshadow)"/>
<!-- Home plate (pentagon) -->
<polygon points="${HX},${HY-12} ${HX-10},${HY-2} ${HX-8},${HY+9} ${HX+8},${HY+9} ${HX+10},${HY-2}" fill="#c8c0a8" filter="url(#bshadow)"/>
<polygon points="${HX},${HY-9} ${HX-7},${HY-1} ${HX-6},${HY+6} ${HX+6},${HY+6} ${HX+7},${HY-1}" fill="#f0ece0"/>
</svg>`;
}

function setStatus(cls, txt) {
  const el = document.getElementById('statusPill');
  el.className = `status-pill ${cls}`;
  document.getElementById('statusTxt').textContent = txt;
}

let _buildRetry = 0;

function buildingScreen() {
  const steps = ['Schedule & Matchups','Season Statistics','Player Scoring','HR Projections'];
  const active = Math.min(_buildRetry, steps.length - 1);
  const rows = steps.map((s,i) => {
    const cls = i < active ? 'done' : i === active ? 'active' : '';
    const icon = i < active ? '✓' : i === active ? '●' : '○';
    return `<div class="bstep ${cls}"><span class="bstep-dot"></span>${icon} ${s}</div>`;
  }).join('');
  return `<div class="loading-screen">
    <div class="loading-logo">⬥</div>
    <div class="loading-title">Building Projections</div>
    <div class="loading-sub">First load takes 10–20s · data is live</div>
    <div class="build-steps">${rows}</div>
  </div>`;
}

async function loadDay(dateObj) {
  setStatus('loading','LOADING');
  document.getElementById('board').innerHTML = `<div class="loading-screen"><div class="loading-logo">⬥</div><div class="loading-title">Fetching Live Data</div><div class="loading-sub">${displayDate(dateObj)}</div></div>`;
  document.getElementById('picksStrip').style.display = 'none';
  document.getElementById('injBar').innerHTML = '';
  document.getElementById('dataFooter').style.display = 'none';
  updateDateUI(dateObj);
  if(autoRefreshTimer){ clearTimeout(autoRefreshTimer); autoRefreshTimer=null; }
  const ds = fmtDate(dateObj);
  try {
    const res = await fetch(`${API_BASE}/api/data?date=${ds}`,{cache:'no-store'});
    if(!res.ok) throw new Error(`Server ${res.status}`);
    const data = await res.json();
    if (data.building) {
      _buildRetry++;
      document.getElementById('board').innerHTML = buildingScreen();
      setTimeout(() => loadDay(dateObj), 5000);
      return;
    }
    _buildRetry = 0;
    serverTop5    = data.top5 || [];
    serverInjuries= data.injuryList || [];
    bustPlayersCache();
    function _mapPitcher(p) {
      if(!p) return {n:'TBD',h:'R',era:4.50,fb:38,vel:92.5,q:'mid',recentEra:4.50,fatigued:false,starts:[],arsenal:{},k9:0,bb9:0,whip:0,fip:0,kPct:0,bbPct:0,kbbPct:0,strikePct:0,pitchPerIP:0,ip:0,gs:0,daysRest:5,lastPitches:0,xwoba_against:0,xera:0,barrel_allowed:0,hard_hit_allowed:0,avg_ev_against:0,sweet_spot_against:0};
      return {
        n:   p.name, h: p.hand||'R', era: p.era||4.50,
        fb:  p.fbPct||38, vel: p.vel||92.5, q: p.quality||'mid',
        recentEra:  p.recentEra  || p.era || 4.50,
        fatigued:   p.fatigued   || false,
        daysRest:   p.daysRest   || 5,
        lastPitches:p.lastPitches|| 0,
        starts:     p.starts     || [],
        arsenal:    p.arsenal    || {},
        k9:         p.k9         || 0,
        bb9:        p.bb9        || 0,
        whip:       p.whip       || 0,
        fip:        p.fip        || 0,
        kPct:       p.kPct       || 0,
        bbPct:      p.bbPct      || 0,
        kbbPct:     p.kbbPct     || 0,
        strikePct:  p.strikePct  || 0,
        pitchPerIP: p.pitchPerIP || 0,
        ip:         p.ip         || 0,
        gs:         p.gs         || 0,
        xwoba_against:      p.xwoba_against      || 0,
        xera:               p.xera               || 0,
        barrel_allowed:     p.barrel_allowed      || 0,
        hard_hit_allowed:   p.hard_hit_allowed    || 0,
        avg_ev_against:     p.avg_ev_against      || 0,
        sweet_spot_against: p.sweet_spot_against  || 0,
      };
    }
    activeGames   = (data.games||[]).map(g => ({
      id:g.id, aw:g.away, hm:g.home, time:g.time, venue:g.venue,
      pf:g.parkFactor, isDome:g.isDome,
      gameTotal: g.gameTotal || 0,
      hpUmp: g.hpUmpScore || 0,
      ap: _mapPitcher(g.awayPitcher),
      hp: _mapPitcher(g.homePitcher),
      serverPlayers: g.players||[],
    }));
    activeWX = {};
    for(const g of data.games||[]) {
      if(g.weather) activeWX[g.id] = {t:g.weather.temp,w:g.weather.wind_mph,d:g.weather.direction,rh:g.weather.humidity,baro:g.weather.pressure,n:g.weather.note,dome:g.weather.dome};
    }
    setStatus('live','LIVE');
    document.getElementById('dataFooter').style.display = '';
    document.getElementById('footerTimestamp').textContent = `Updated ${new Date().toLocaleTimeString()}`;
    // Auto-expand the top 3 games by average player score
    const gameScores = activeGames.map(g => ({
      id: g.id,
      avg: g.serverPlayers && g.serverPlayers.length
        ? g.serverPlayers.reduce((s,p)=>s+(p.score||0),0) / g.serverPlayers.length : 0
    })).sort((a,b)=>b.avg-a.avg);
    expandedGames = new Set(gameScores.slice(0,3).map(x=>x.id));
    // Rebuild player lookup map for spray chart clicks
    playerMap = {};
    for (const g of activeGames) {
      for (const p of buildPlayers(g)) { playerMap[p.name] = p; }
    }
    render();
    loadHistory(ds);
    autoRefreshTimer = setTimeout(()=>loadDay(currentDate), REFRESH_MS);
    // Re-render countdown badges every 60s without a network call
    if (!window._lockTimer) window._lockTimer = setInterval(render, 60000);
  } catch(err) {
    console.warn(err);
    setStatus('err','NO SERVER');
    showNoServer(err.message);
  }
}

async function loadHistory(ds) {

const _playersCache = new Map();
function bustPlayersCache() { _playersCache.clear(); }

function buildPlayers(g) {
  if (_playersCache.has(g.id)) return _playersCache.get(g.id);
  if(!g.serverPlayers||!g.serverPlayers.length) return [];
  const result = g.serverPlayers.map(sp => {
    const isAway = sp.team === g.aw;
    const pitcher = isAway ? g.hp : g.ap;
    return {
      name: sp.name, mlbId: sp.mlbId||null, team: sp.team, pos: sp.pos||'',
      bats: sp.bats||'R', G: sp.G||0, HR: sp.HR||0,
      hrPct: sp.hrPct||0, OPS: sp.OPS||0, SLG: sp.SLG||0, ISO: sp.ISO||0,
      barrel: sp.barrel||0, hardHit: sp.hardHit||0, avgEV: sp.avgEV||0,
      xwOBA: sp.xwOBA||0, sweetSpot: sp.sweetSpot||0, pullPct: sp.pullPct||0,
      pitcher, pitcherRecentEra: sp.pitcherRecentEra||pitcher.era,
      pitcherFatigued: sp.pitcherFatigued||false,
      pitcherBarrelAllowed: sp.pitcherBarrelAllowed||0,
      lineupPos: sp.lineupPos||0, confirmed: sp.confirmed||false,
      isHome: sp.isHome||false, recentHR: sp.recentHR||0,
      recentHRPct: sp.recentHRPct||0, hotStreak: sp.hotStreak||false,
      hotMonth: sp.hotMonth||false, monthHRPct: sp.monthHRPct||0,
      trend: sp.trend||0, recentHR7d: sp.recentHR7d||0, recentG7d: sp.recentG7d||0,
      oppBullpenEra: sp.oppBullpenEra||4.50,
      hpUmp: sp.hpUmp||'', umpScore: sp.umpScore||0,
      gameTotal: sp.gameTotal||0,
      sprintSpeed: sp.sprintSpeed||null, hrProb: sp.hrProb||0,
      h2h: sp.h2h||null,
      pitchMatchup: sp.pitchMatchup || [],
      sprayAdj:     sp.sprayAdj     || 0,
      scoreBreakdown: sp.scoreBreakdown || null,
      flyBall:    sp.flyBall    || 0,
      whiffPct:   sp.whiffPct   || 0,
      la:         sp.la         || 0,
      pitcherK9:  sp.pitcherK9  || 0,
      kPct:       sp.kPct       || 0,
      gamesSinceHR:  sp.gamesSinceHR  || 0,
      lastGameH:     sp.lastGameH     || 0,
      lastGameAB:    sp.lastGameAB    || 0,
      lastGameHR:    sp.lastGameHR    || 0,
      prevOhFor:     sp.prevOhFor     || false,
      pctAfterOhFor: sp.pctAfterOhFor || 0,
      pctAfter1Hit:  sp.pctAfter1Hit  || 0,
      pctAfterMulti: sp.pctAfterMulti || 0,
      hrForm: sp.hrPct > 0
        ? Math.min(99, Math.max(0, Math.round((sp.recentHRPct||0) / sp.hrPct * 50)))
        : 0,
      platoon: platAdj(sp.bats||'R', pitcher.h),
      score: sp.score||0, tier: sp.tier||tierOf(sp.score||0),
      gameId: g.id,
    };
  });
  _playersCache.set(g.id, result);
  return result;
}

function trendHtml(p) {
  const t = p.trend || 0;
  if (t >=  2) return `<span class="trend-up2" title="On fire — 7d HR rate 60%+ above 15d avg">▲▲</span>`;
  if (t >=  1) return `<span class="trend-up1" title="Heating up — 7d HR rate above 15d avg">▲</span>`;
  if (t <= -2) return `<span class="trend-dn2" title="Going cold — 7d HR rate 65%+ below 15d avg">▼▼</span>`;
  if (t <= -1) return `<span class="trend-dn1" title="Cooling off — 7d HR rate below 15d avg">▼</span>`;
  return '';
}
