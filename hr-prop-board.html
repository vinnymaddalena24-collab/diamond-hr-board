<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIAMOND ⬥ HR Prop Board</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060C18; --surface:#0C1525; --card:#111E32; --card2:#162540;
  --border:#1E3050; --border2:#2A4268;
  --blue:#3B82F6; --blue-dim:#1E40AF;
  --amber:#F59E0B; --green:#10B981; --red:#EF4444;
  --orange:#F97316; --purple:#8B5CF6; --teal:#14B8A6;
  --text:#E2E8F0; --sub:#94A3B8; --muted:#475569; --dim:#1E3050;
  --s:#10B981; --a:#F59E0B; --b:#F97316; --c:#3B82F6; --d:#475569;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px}
body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;min-height:100vh}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:200;background:rgba(6,12,24,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);height:56px;display:flex;align-items:center;padding:0 20px;gap:14px}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,#3B82F6,#8B5CF6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:900;color:#fff;flex-shrink:0}
.logo-name{font-size:14px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--text)}
.logo-name em{color:var(--blue);font-style:normal}
.hdr-date{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:1px;display:none}
@media(min-width:600px){.hdr-date{display:block}}
.hdr-r{margin-left:auto;display:flex;align-items:center;gap:7px}
.status-pill{display:inline-flex;align-items:center;gap:5px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;padding:4px 10px;border-radius:20px;border:1px solid transparent}
.status-pill.live{background:rgba(16,185,129,.12);border-color:rgba(16,185,129,.35);color:var(--green)}
.status-pill.loading{background:rgba(71,85,105,.15);border-color:var(--border);color:var(--muted)}
.status-pill.err{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35);color:var(--red)}
.s-dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 1.4s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.icon-btn{background:var(--card);border:1px solid var(--border);color:var(--sub);cursor:pointer;padding:5px 11px;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;transition:all .15s}
.icon-btn:hover{border-color:var(--blue);color:var(--blue)}
.date-nav{display:flex;align-items:center;gap:4px}
.dbtn{background:var(--card);border:1px solid var(--border);color:var(--sub);cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s}
.dbtn:hover{border-color:var(--blue);color:var(--blue)}
.dbtn.today{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.45);color:var(--blue);font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;width:auto;padding:0 9px;letter-spacing:1px}

/* ── TOP PICKS STRIP ── */
.picks-strip{border-bottom:1px solid var(--border);padding:12px 20px;background:var(--surface)}
.picks-hd{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.picks-hd-label{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;white-space:nowrap}
.picks-hd-line{flex:1;height:1px;background:var(--border)}
.picks-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.picks-row::-webkit-scrollbar{display:none}
.pick-card{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;display:flex;align-items:center;gap:12px;min-width:220px;cursor:pointer;transition:all .15s}
.pick-card:hover{border-color:var(--border2);transform:translateY(-1px)}
.pick-card.rank1{border-color:rgba(245,158,11,.4);background:linear-gradient(135deg,rgba(245,158,11,.04),transparent)}
.pick-photo{width:44px;height:44px;border-radius:50%;border:2px solid var(--border);background:var(--surface);flex-shrink:0;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;font-size:18px}
.pick-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center}
.pick-info{flex:1;min-width:0}
.pick-rank{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:1px;color:var(--muted);margin-bottom:1px}
.pick-rank.gold{color:var(--amber)}
.pick-name{font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pick-sub{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--sub);margin-top:2px}
.pick-score-wrap{text-align:center;flex-shrink:0}
.pick-score{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:26px;line-height:1}
.pick-tier-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:1px;margin-top:2px}
.pick-prob{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-top:1px}
.cS .pick-score,.cS .pick-tier-lbl{color:var(--s)}
.cA .pick-score,.cA .pick-tier-lbl{color:var(--a)}
.cB .pick-score,.cB .pick-tier-lbl{color:var(--b)}
.cC .pick-score,.cC .pick-tier-lbl{color:var(--c)}

/* ── FILTER BAR ── */
.filter-bar{display:flex;align-items:center;gap:5px;padding:8px 20px;border-bottom:1px solid var(--border);background:rgba(6,12,24,.97);backdrop-filter:blur(8px);position:sticky;top:56px;z-index:100;overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap}
.filter-bar::-webkit-scrollbar{display:none}
.ftab{flex-shrink:0;padding:5px 13px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;cursor:pointer;border-radius:6px;transition:all .12s;white-space:nowrap}
.ftab:hover{border-color:var(--blue);color:var(--text)}
.ftab.on{background:var(--blue);border-color:var(--blue);color:#fff}
.ftab.on-g{background:var(--green);border-color:var(--green);color:#fff}
.fb-div{width:1px;height:18px;background:var(--border);flex-shrink:0;margin:0 2px}
.fb-search{background:var(--card);border:1px solid var(--border);color:var(--text);padding:5px 10px;font-family:'JetBrains Mono',monospace;font-size:9px;border-radius:6px;outline:none;width:140px;flex-shrink:0;margin-left:auto}
.fb-search:focus{border-color:var(--blue)}
.fb-search::placeholder{color:var(--muted)}

/* ── LAYOUT ── */
.layout{display:flex;min-height:calc(100vh - 56px)}
.main-col{flex:1;min-width:0;padding:18px 20px}
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:14px}

/* ── GAME CARD ── */
.game-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .15s}
.game-card:hover{border-color:var(--border2)}
.game-card.expanded{border-color:var(--blue)}
.gc-head{padding:14px 16px 10px;cursor:pointer;user-select:none}
.gc-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:9px;gap:8px}
.gc-matchup{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;letter-spacing:1px}
.gc-meta{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sub);margin-top:2px}
.gc-live{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:2px 7px;border-radius:4px;background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.3);flex-shrink:0}
/* Pitcher row */
.gc-pitchers-row{display:flex;gap:6px;margin-bottom:9px;flex-wrap:wrap}
.gc-pp{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:5px 9px;flex:1;min-width:130px}
.gc-pp.danger{border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.04)}
.gc-pp.elite{border-color:rgba(16,185,129,.35);background:rgba(16,185,129,.04)}
.pp-tm{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;color:var(--muted);width:24px;flex-shrink:0}
.pp-nm{font-size:11px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pp-era{font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;flex-shrink:0}
.pp-era.danger{color:var(--red)} .pp-era.elite{color:var(--green)} .pp-era.mid{color:var(--amber)}
.pp-hand{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);flex-shrink:0}
.pp-dots{display:flex;gap:2px;flex-shrink:0}
.pp-dot{width:6px;height:6px;border-radius:50%}
/* Condition badges */
.gc-conds{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:9px}
.cbdg{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.5px;padding:2px 7px;border-radius:4px;border:1px solid transparent}
.cbdg.wo{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--amber)}
.cbdg.wi{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);color:var(--blue)}
.cbdg.wc{background:var(--surface);border-color:var(--border);color:var(--muted)}
.cbdg.pf-hi{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red)}
.cbdg.pf-lo{background:rgba(59,130,246,.1);border-color:rgba(59,130,246,.3);color:var(--blue)}
.cbdg.pf-md{background:var(--surface);border-color:var(--border);color:var(--sub)}
.cbdg.tot{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.3);color:var(--purple)}
.cbdg.ump{background:var(--surface);border-color:var(--border);color:var(--muted)}
.cbdg.tmp{background:var(--surface);border-color:var(--border);color:var(--sub)}
/* Mini picks */
.gc-picks-row{display:flex;gap:7px}
.gc-mini{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 10px;display:flex;align-items:center;gap:8px;min-width:0}
.gc-mini-photo{width:32px;height:32px;border-radius:50%;background:var(--card);flex-shrink:0;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;font-size:13px;border:1.5px solid var(--border)}
.gc-mini-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center}
.gc-mini-info{flex:1;min-width:0}
.gc-mini-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gc-mini-sub{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--sub);margin-top:1px}
.gc-mini-score{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:20px;line-height:1;flex-shrink:0}
.gc-footer{display:flex;align-items:center;justify-content:space-between;padding:0;border-top:1px solid var(--border);cursor:pointer;user-select:none;transition:background .12s}
.gc-footer:hover{background:rgba(59,130,246,.06)}
.gc-footer-btn{width:100%;padding:10px 16px;display:flex;align-items:center;justify-content:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--blue);transition:color .12s}
.gc-footer:hover .gc-footer-btn{color:#60a5fa}
.gc-chev{transition:transform .2s;font-size:11px}
.gc-chev.open{transform:rotate(180deg)}

/* ── GAME DETAIL (expanded) ── */
.gc-detail{border-top:2px solid var(--blue);background:var(--surface)}
.gcd-conditions{display:flex;gap:8px;flex-wrap:wrap;padding:10px 16px;border-bottom:1px solid var(--border);background:rgba(6,12,24,.4);align-items:center}
.gcd-pitcher-strip{display:flex;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.pitcher-detail-card{flex:1;min-width:170px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.pitcher-detail-card.danger{border-color:rgba(239,68,68,.3)} .pitcher-detail-card.elite{border-color:rgba(16,185,129,.3)}
.pdc-team{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;color:var(--muted);letter-spacing:1px;margin-bottom:2px}
.pdc-name{font-size:14px;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.pdc-hand{font-family:'JetBrains Mono',monospace;font-size:9px;padding:1px 6px;border-radius:3px;background:var(--surface);border:1px solid var(--border);color:var(--sub)}
.pdc-stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.pdc-stat .lbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);display:block}
.pdc-stat .val{font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700}
.pdc-stat .val.danger{color:var(--red)} .pdc-stat .val.elite{color:var(--green)} .pdc-stat .val.mid{color:var(--amber)}
.pdc-form{display:flex;align-items:center;gap:3px}
.pdc-form-lbl{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-right:4px}
.pf-dot{width:9px;height:9px;border-radius:50%}

/* ── PLAYER TABLE ── */
.pt-wrap{overflow-x:auto}
table.pt{width:100%;border-collapse:collapse}
table.pt th{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);padding:7px 10px;border-bottom:1px solid var(--border);background:rgba(6,12,24,.6);text-align:left;white-space:nowrap;cursor:pointer;transition:color .1s;user-select:none}
table.pt th:hover{color:var(--blue)}
table.pt th.r{text-align:right}
table.pt th.c{text-align:center}
.th-sort{margin-left:3px;opacity:.4}
.th-sort.asc::after{content:'↑'} .th-sort.desc::after{content:'↓'}
.section-row td{padding:4px 10px 3px!important;background:rgba(6,12,24,.7);font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);border-top:1px solid var(--border)}
.pr{cursor:pointer;border-bottom:1px solid var(--dim);transition:background .07s}
.pr:hover{background:rgba(59,130,246,.04)}
.pr.sel{background:rgba(245,158,11,.07)}
.pr.sel .sel-dot{background:var(--amber)!important;border-color:var(--amber)!important}
.pr td{padding:6px 10px;vertical-align:middle}

/* Photo cell */
.td-ph{width:52px;padding:5px 4px 5px 10px!important}
.p-photo-wrap{position:relative;width:38px;height:38px}
.p-photo{width:38px;height:38px;border-radius:50%;background:var(--card2);border:2px solid var(--border);overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;font-size:15px}
.p-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:top center}
.sel-dot{position:absolute;top:-2px;right:-2px;width:11px;height:11px;border-radius:50%;background:var(--dim);border:2px solid var(--surface);transition:all .12s}

/* Player name cell */
.td-player{min-width:150px}
.p-name{font-size:13px;font-weight:700;display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.p-team{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:1px 5px;border-radius:3px;background:var(--card2);color:var(--text);flex-shrink:0}
.p-pos{font-family:'JetBrains Mono',monospace;font-size:8px;padding:1px 5px;border-radius:3px;background:var(--surface);border:1px solid var(--border);color:var(--sub);flex-shrink:0}
.p-ord{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:1px 6px;border-radius:3px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--green);flex-shrink:0}
.p-sub{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--sub);margin-top:2px}

/* Matchup cell */
.td-vs{min-width:130px}
.vs-pitcher{font-size:11px;font-weight:600}
.vs-era{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--sub)}
.vs-h2h{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--green);margin-top:2px}

/* Stat cells */
.td-num{font-family:'JetBrains Mono',monospace;font-size:12px;text-align:right;color:var(--sub);white-space:nowrap;min-width:60px}
.td-num .big{font-size:13px;font-weight:700;color:var(--text);display:block}
.td-num .sml{font-size:9px;color:var(--muted)}
.hi-green{color:var(--green)!important;font-weight:700!important}
.hi-amber{color:var(--amber)!important;font-weight:700!important}

/* Edges cell */
.td-edges{min-width:140px}
.edges{display:flex;flex-wrap:wrap;gap:3px}
.edge{font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:700;padding:1px 5px;border-radius:3px;border:1px solid transparent;white-space:nowrap}
.edge.pos{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.3);color:var(--green)}
.edge.neg{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:var(--red)}
.edge.neu{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:var(--amber)}
.edge.inf{background:rgba(139,92,246,.1);border-color:rgba(139,92,246,.3);color:var(--purple)}
.edge.dat{background:var(--card2);border-color:var(--border);color:var(--sub)}

/* Score cell */
.td-score{text-align:right;padding-right:12px!important;min-width:72px}
.score-num{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:22px;line-height:1}
.score-S{color:var(--s)} .score-A{color:var(--a)} .score-B{color:var(--b)} .score-C{color:var(--c)} .score-D{color:var(--d)}
.tier-badge{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;padding:1px 5px;border-radius:4px;display:inline-block;margin-top:2px}
.tS{background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);color:var(--s)}
.tA{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);color:var(--a)}
.tB{background:rgba(249,115,22,.1);border:1px solid rgba(249,115,22,.3);color:var(--b)}
.tC{background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.3);color:var(--c)}
.tD{background:var(--card2);border:1px solid var(--border);color:var(--muted)}
.prob-bar{height:3px;background:var(--dim);border-radius:2px;margin-top:3px;width:52px;overflow:hidden;margin-left:auto}
.prob-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--green))}

/* Action cell */
.td-act{padding-right:12px!important;white-space:nowrap}
.add-btn{background:transparent;border:1px solid var(--border);color:var(--muted);cursor:pointer;padding:4px 10px;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:700;letter-spacing:.5px;transition:all .12s;white-space:nowrap}
.add-btn:hover{border-color:var(--blue);color:var(--blue)}
.add-btn.added{border-color:var(--amber);color:var(--amber);background:rgba(245,158,11,.07)}
.star-btn{background:transparent;border:none;cursor:pointer;font-size:12px;color:var(--muted);padding:3px 4px;transition:color .1s;vertical-align:middle}
.star-btn:hover{color:var(--amber)}
.star-btn.on{color:var(--amber)}

/* ── PARLAY SLIP ── */
.slip{width:260px;flex-shrink:0;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:56px;height:calc(100vh - 56px);overflow:hidden}
.slip-hd{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-bottom:1px solid var(--border)}
.slip-title{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.slip-ct{font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;background:var(--blue);color:#fff;padding:2px 8px;border-radius:20px;min-width:22px;text-align:center}
.slip-body{flex:1;overflow-y:auto;padding:9px}
.slip-empty{text-align:center;padding:28px 14px;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);letter-spacing:1px;line-height:2.2}
.slip-leg{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--amber);border-radius:6px;padding:8px 10px;margin-bottom:6px;display:flex;align-items:flex-start;gap:6px;animation:sIn .14s ease}
@keyframes sIn{from{opacity:0;transform:translateX(6px)}}
.sl-info{flex:1;min-width:0}
.sl-name{font-size:12px;font-weight:700;line-height:1.2}
.sl-sub{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-top:2px}
.sl-score{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;color:var(--amber);flex-shrink:0}
.sl-rm{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:1px 3px;transition:color .1s}
.sl-rm:hover{color:var(--red)}
.slip-ft{border-top:1px solid var(--border);padding:12px 15px}
.slip-stat{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:3px}
.slip-stat .v{color:var(--text)}
.slip-odds{font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:var(--green);margin:4px 0 2px}
.slip-warn{font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--amber);min-height:11px;margin-bottom:5px}
.slip-copy{width:100%;background:var(--amber);color:#000;border:none;padding:8px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;border-radius:6px;transition:opacity .1s}
.slip-copy:hover{opacity:.88} .slip-copy:disabled{opacity:.35;cursor:not-allowed}
.slip-clear{width:100%;background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px;font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;cursor:pointer;border-radius:6px;margin-top:5px;transition:all .1s}

/* ── NO SERVER ── */
.no-server{max-width:480px;margin:60px auto;padding:0 20px}
.ns-icon{font-size:36px;margin-bottom:14px}
.ns-title{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}

.ns-t code{font-family:'JetBrains Mono',monospace;font-size:10px;background:var(--bg);color:var(--green);padding:1px 5px;border-radius:3px}
.ns-retry{margin-top:14px;background:var(--blue);color:#fff;border:none;padding:9px 22px;font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:700;letter-spacing:1px;cursor:pointer;border-radius:6px;transition:opacity .1s}
.ns-retry:hover{opacity:.85}

/* ── LOADING / EMPTY ── */
.loading-screen{display:flex;align-items:center;justify-content:center;gap:12px;padding:80px 20px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:2px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}

  table.pt th:nth-child(n+5),.pr td:nth-child(n+5){display:none}
}

<body>

<!-- HEADER -->

<script>
'use strict';

// ═══════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════
const API_BASE = (location.protocol === 'file:' || !location.host)
  ? 'http://localhost:8765' : location.origin;
const REFRESH_MS = 15 * 60 * 1000;

// ═══════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════
let currentDate = new Date(); currentDate.setHours(0,0,0,0);
let activeTab = 'all', searchQ = '';
let expandedGames = new Set(); // all games expanded by default
let legs = [];
let activeGames = [], activeWX = {};
let serverTop5 = [], serverInjuries = [];
let sortCol = 'score', sortDir = 'desc';
let autoRefreshTimer = null;
let targetSet = new Set(JSON.parse(localStorage.getItem('dmd_targets') || '[]'));
function saveTargets() { localStorage.setItem('dmd_targets', JSON.stringify([...targetSet])); }

// ═══════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function displayDate(d) {
  return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric',year:'numeric'}).toUpperCase();
}
function tierOf(s) { return s>=80?'S':s>=65?'A':s>=50?'B':s>=35?'C':'D'; }
function scoreColor(t) { return {S:'var(--s)',A:'var(--a)',B:'var(--b)',C:'var(--c)',D:'var(--d)'}[t]||'var(--d)'; }
function platAdj(bats, ph) { if(bats==='S') return 4; return bats!==ph?8:-4; }
function eraClass(era) { return era<2.80?'elite':era>4.80?'danger':'mid'; }

function formDots(recentEra, era, fatigued) {
  // Generate 5 form dots based on recent vs season ERA
  const dots = [];
  for(let i=0;i<5;i++){
    let c;
    if(fatigued && i===0) c='#EF4444';
    else if(recentEra < era * 0.85) c='#10B981';
    else if(recentEra < era * 1.05) c='#F59E0B';
    else c='#EF4444';
    // Add some variation
    const offset = (i - 2) * 0.15;
    const v = recentEra + offset;
    c = v < 3.50 ? '#10B981' : v < 4.50 ? '#F59E0B' : '#EF4444';
    dots.push(`<span class="pf-dot" style="background:${c}"></span>`);
  }
  return dots.join('');
}

function computeEdges(p, g) {
  const wx = activeWX[g.id] || {};
  const edges = [];
  // Platoon
  const pl = platAdj(p.bats, p.pitcher.h);
  if(pl >= 8)  edges.push({l:'⚡ L/R ADV', t:'pos'});
  if(pl <= -4) edges.push({l:'L/R DISADV', t:'neg'});
  // Hot streak / month
  if(p.hotStreak) edges.push({l:'🔥 HOT 15D', t:'pos'});
  if(p.hotMonth)  edges.push({l:'↑ HOT MONTH', t:'pos'});
  // H2H
  if(p.h2h && p.h2h.hr >= 2) edges.push({l:`${p.h2h.hr}HR H2H`, t:'pos'});
  else if(p.h2h && p.h2h.hr === 1) edges.push({l:`1HR H2H`, t:'pos'});
  else if(p.h2h && p.h2h.ab >= 7 && p.h2h.ops <= 0.450) edges.push({l:'0HR H2H', t:'neg'});
  // Pitcher vuln
  if(p.pitcherFatigued) edges.push({l:'TIRED P', t:'pos'});
  if(p.pitcherEra >= 5.20) edges.push({l:`${p.pitcherEra.toFixed(2)} ERA`, t:'pos'});
  if(p.pitcherBarrelAllowed >= 12) edges.push({l:'P BARRELS', t:'pos'});
  // Wind
  if(!wx.dome) {
    if((wx.w||0) >= 10 && wx.d==='out') edges.push({l:`↑${wx.w}mph OUT`, t:'pos'});
    if((wx.w||0) >= 10 && wx.d==='in')  edges.push({l:`↓${wx.w}mph IN`, t:'neg'});
  }
  // Park
  if(g.pf >= 112) edges.push({l:`PF ${g.pf}`, t:'pos'});
  // Bullpen
  if(p.oppBullpenEra >= 5.0) edges.push({l:'WEAK BP', t:'pos'});
  // Game total
  if(p.gameTotal >= 9.5) edges.push({l:`O/U ${p.gameTotal}`, t:'neu'});
  // Ump
  if(p.umpScore >= 1.0) edges.push({l:'UMP TIGHT', t:'pos'});
  // Barrel power
  if(p.barrel >= 15) edges.push({l:`${p.barrel.toFixed(0)}% BBL`, t:'dat'});
  // Travel jet lag
  if(p.travelAdj <= -2) edges.push({l:'✈ JET LAG', t:'neg'});
  else if(p.travelAdj <= -1) edges.push({l:'✈ TRAVEL', t:'neg'});
  // Spray/park
  if(p.sprayAdj >= 4) edges.push({l:'🏟 PULL PARK', t:'pos'});
  // Pitch matchup top insight
  if(p.pitchMatchup && p.pitchMatchup.length) {
    const top = p.pitchMatchup.find(m => m.verdict === 'CRUSHES' && m.pct >= 20);
    if(top) edges.push({l:`CRUSHES ${top.name.split(' ')[0]}`, t:'pos'});
    else {
      const bad = p.pitchMatchup.find(m => m.verdict === 'STRUGGLES' && m.pct >= 20);
      if(bad) edges.push({l:`WEAK vs ${bad.name.split(' ')[0]}`, t:'neg'});
    }
  }
  // PrizePicks
  if(p.ppLine != null) edges.push({l:`PP ${p.ppLine}`, t:'inf'});
  // Confirmed in lineup
  if(p.confirmed && p.lineupPos > 0) edges.push({l:`#${p.lineupPos} LINEUP`, t:'neu'});

  return edges.slice(0, 6);
}

// ═══════════════════════════════════════════════════
// DATA LOADING
// ═══════════════════════════════════════════════════
function setStatus(cls, txt) {
  const el = document.getElementById('statusPill');
  el.className = `status-pill ${cls}`;
  document.getElementById('statusTxt').textContent = txt;
}

async function loadDay(dateObj) {
  setStatus('loading','LOADING');
  document.getElementById('board').innerHTML = `<div class="loading-screen"><div class="spinner"></div>FETCHING LIVE DATA — ${displayDate(dateObj)}...</div>`;
  document.getElementById('picksStrip').style.display = 'none';
  document.getElementById('injBar').innerHTML = '';
  document.getElementById('dataFooter').style.display = 'none';
  updateDateUI(dateObj);
  if(autoRefreshTimer){ clearTimeout(autoRefreshTimer); autoRefreshTimer=null; }
  const ds = fmtDate(dateObj);
  try {
    const res = await fetch(`${API_BASE}/api/data?date=${ds}`,{cache:'no-store'});
    if(!res.ok) throw new Error(`Server ${res.status}`);
    const data = await res.json();
    serverTop5    = data.top5 || [];
    serverInjuries= data.injuryList || [];
    activeGames   = (data.games||[]).map(g => ({
      id:g.id, aw:g.away, hm:g.home, time:g.time, venue:g.venue,
      pf:g.parkFactor, isDome:g.isDome,
      gameTotal: g.gameTotal || 0,
      hpUmp: g.hpUmpScore || 0,
      ap:{ n:g.awayPitcher.name, h:g.awayPitcher.hand||'R', era:g.awayPitcher.era||4.50,
           fb:g.awayPitcher.fbPct||38, vel:g.awayPitcher.vel||92.5, q:g.awayPitcher.quality||'mid',
           recentEra: g.awayPitcher.pitcherRecentEra||g.awayPitcher.era||4.50,
           fatigued: g.awayPitcher.pitcherFatigued||false },
      hp:{ n:g.homePitcher.name, h:g.homePitcher.hand||'R', era:g.homePitcher.era||4.50,
           fb:g.homePitcher.fbPct||38, vel:g.homePitcher.vel||92.5, q:g.homePitcher.quality||'mid',
           recentEra: g.homePitcher.pitcherRecentEra||g.homePitcher.era||4.50,
           fatigued: g.homePitcher.pitcherFatigued||false },
      serverPlayers: g.players||[],
    }));
    activeWX = {};
    for(const g of data.games||[]) {
      if(g.weather) activeWX[g.id] = {t:g.weather.temp,w:g.weather.wind_mph,d:g.weather.direction,rh:g.weather.humidity,baro:g.weather.pressure,n:g.weather.note,dome:g.weather.dome};
    }
    setStatus('live','LIVE');
    document.getElementById('dataFooter').style.display = '';
    document.getElementById('footerTimestamp').textContent = `Updated ${new Date().toLocaleTimeString()}`;
    expandedGames = new Set(); // collapsed by default — click SHOW MORE to expand
    render();
    autoRefreshTimer = setTimeout(()=>loadDay(currentDate), REFRESH_MS);
  } catch(err) {
    console.warn(err);
    setStatus('err','NO SERVER');
    showNoServer(err.message);
  }
}

function updateDateUI(d) {
  const ds = displayDate(d);
  document.getElementById('hdrDate').textContent = ds;
  document.getElementById('picksDate').textContent = ds;
  const isToday = d.toDateString() === (new Date()).toDateString();
  document.getElementById('todayBtn').classList.toggle('today', isToday);
}

function showNoServer(msg) {
  document.getElementById('board').innerHTML = `
  <div class="no-server">
    <div class="ns-icon">🔌</div>
    <div class="ns-title">Server Offline</div>
    <div class="ns-err">${msg}</div>
    <div class="ns-step"><div class="ns-n">1</div><div class="ns-t">Start the backend: <code>cd ~/Claude.md && python3 diamond_server.py</code></div></div>
    <div class="ns-step"><div class="ns-n">2</div><div class="ns-t">Keep the terminal running, then retry below.</div></div>
    <button class="ns-retry" onclick="loadDay(currentDate)">↺ RETRY CONNECTION</button>
  </div>`;
}

function refreshData() {
  fetch(`${API_BASE}/api/refresh`).catch(()=>{});
  loadDay(currentDate);
}

// ═══════════════════════════════════════════════════
// BUILD PLAYERS FROM SERVER DATA
// ═══════════════════════════════════════════════════
function buildPlayers(g) {
  if(!g.serverPlayers||!g.serverPlayers.length) return [];
  return g.serverPlayers.map(sp => {
    const isAway = sp.team === g.aw;
    const pitcher = isAway ? g.hp : g.ap;
    return {
      name: sp.name, mlbId: sp.mlbId||null, team: sp.team, pos: sp.pos||'',
      bats: sp.bats||'R', G: sp.G||0, HR: sp.HR||0,
      hrPct: sp.hrPct||0, OPS: sp.OPS||0, SLG: sp.SLG||0, ISO: sp.ISO||0,
      barrel: sp.barrel||0, hardHit: sp.hardHit||0, avgEV: sp.avgEV||0,
      xwOBA: sp.xwOBA||0, sweetSpot: sp.sweetSpot||0, pullPct: sp.pullPct||0,
      pitcher, pitcherRecentEra: sp.pitcherRecentEra||pitcher.era,
      pitcherFatigued: sp.pitcherFatigued||false,
      pitcherBarrelAllowed: sp.pitcherBarrelAllowed||0,
      lineupPos: sp.lineupPos||0, confirmed: sp.confirmed||false,
      isHome: sp.isHome||false, recentHR: sp.recentHR||0,
      recentHRPct: sp.recentHRPct||0, hotStreak: sp.hotStreak||false,
      hotMonth: sp.hotMonth||false, monthHRPct: sp.monthHRPct||0,
      oppBullpenEra: sp.oppBullpenEra||4.50,
      hpUmp: sp.hpUmp||'', umpScore: sp.umpScore||0,
      gameTotal: sp.gameTotal||0, ppLine: sp.ppLine??null, ppType: sp.ppType||'',
      sprintSpeed: sp.sprintSpeed||null, hrProb: sp.hrProb||0,
      h2h: sp.h2h||null,
      pitchMatchup: sp.pitchMatchup || [],
      travelAdj:    sp.travelAdj    || 0,
      sprayAdj:     sp.sprayAdj     || 0,
      platoon: platAdj(sp.bats||'R', pitcher.h),
      score: sp.score||0, tier: sp.tier||tierOf(sp.score||0),
      gameId: g.id,
    };
  });
}

function sortedPlayers(players) {
  const confirmed = players.filter(p=>p.lineupPos>0).sort((a,b)=>a.lineupPos-b.lineupPos);
  const projected = players.filter(p=>p.lineupPos<=0);
  projected.sort((a,b) => {
    const av = a[sortCol], bv = b[sortCol];
    if(sortDir==='desc') return (bv||0)-(av||0);
    return (av||0)-(bv||0);
  });
  return {confirmed, projected};
}

// GAME CARD

function condBadges(g) {
  const wx = activeWX[g.id]||{};
  const badges = [];
  // Wind
  if(wx.dome) badges.push(`<span class="cbdg wc">DOME</span>`);
  else if((wx.w||0)<3) badges.push(`<span class="cbdg wc">CALM</span>`);
  else if(wx.d==='out') badges.push(`<span class="cbdg wo">↑${wx.w}mph OUT</span>`);
  else if(wx.d==='in')  badges.push(`<span class="cbdg wi">↓${wx.w}mph IN</span>`);
  else badges.push(`<span class="cbdg wc">↔${wx.w||0}mph X</span>`);
  // Temp
  if(wx.t) badges.push(`<span class="cbdg tmp">${wx.t}°F</span>`);
  // Park factor
  const pf = g.pf||100;
  if(pf>=120) badges.push(`<span class="cbdg pf-hi">PF ${pf} HR PARK</span>`);
  else if(pf>=108) badges.push(`<span class="cbdg pf-hi">PF ${pf}</span>`);
  else if(pf<=93) badges.push(`<span class="cbdg pf-lo">PF ${pf} PITCHER</span>`);
  else badges.push(`<span class="cbdg pf-md">PF ${pf}</span>`);
  // Game total
  if(g.gameTotal) badges.push(`<span class="cbdg tot">O/U ${g.gameTotal}</span>`);
  // Ump
  if(g.hpUmp && Math.abs(g.hpUmp)>=1) badges.push(`<span class="cbdg ump">⚖ UMP ${g.hpUmp>0?'+':''}${g.hpUmp}</span>`);
  return badges.join('');
}

function pitcherPill(pitcher, teamAbbr) {

  return `<div class="gc-pp ${ec}">
    <span class="pp-tm">${teamAbbr}</span>

    <span class="pp-era ${ec}">${pitcher.era.toFixed(2)}</span>
    <span class="pp-hand">${pitcher.h}HP</span>

}

function miniPickHtml(p, g) {

function renderGameCard(g) {
  const allPlayers = buildPlayers(g);
  let filtered = [...allPlayers].sort((a,b)=>b.score-a.score);
  if(activeTab==='stars')     filtered = filtered.filter(p=>p.score>=80);
  if(activeTab==='good')      filtered = filtered.filter(p=>p.score>=65);
  if(activeTab==='hot')       filtered = filtered.filter(p=>p.hotStreak);
  if(activeTab==='platoon')   filtered = filtered.filter(p=>p.platoon>=8);
  if(activeTab==='confirmed') filtered = filtered.filter(p=>p.confirmed);
  if(activeTab==='targets')   filtered = filtered.filter(p=>targetSet.has(p.name));
  if(searchQ) { const sq=searchQ.toLowerCase(); filtered=filtered.filter(p=>p.name.toLowerCase().includes(sq)||p.team.toLowerCase().includes(sq)); }
  if(!filtered.length && activeTab!=='all') return '';

  const topPicks = allPlayers.sort((a,b)=>b.score-a.score).slice(0,2);
  const isExp = expandedGames.has(g.id);
  const wx = activeWX[g.id]||{};

  return `<div class="game-card${isExp?' expanded':''}" id="gc-${g.id}">
    <div class="gc-head" onclick="toggleGame('${g.id}')">

        <div>

          <div class="gc-meta">${g.time} · ${g.venue}</div>
        </div>
        ${wx.dome?'<span class="gc-live">DOME</span>':''}
      </div>
      <div class="gc-pitchers-row">
        ${pitcherPill(g.ap, g.aw)}
        ${pitcherPill(g.hp, g.hm)}
      </div>
      <div class="gc-conds">${condBadges(g)}</div>
      <div class="gc-picks-row">${topPicks.map(p=>miniPickHtml(p,g)).join('')}</div>
    </div>
    <div class="gc-footer" onclick="toggleGame('${g.id}')">
      <div class="gc-footer-btn">
        <span class="gc-chev${isExp?' open':''}">▼</span>
        ${isExp ? `HIDE PLAYERS` : `SHOW ${allPlayers.length} PLAYERS`}
        <span class="gc-chev${isExp?' open':''}">▼</span>
      </div>
    </div>
    ${isExp ? renderGameDetail(g, filtered) : ''}
  </div>`;
}

function renderGameDetail(g, players) {
  const {confirmed, projected} = sortedPlayers(players);

  let tableRows = '';
  if(confirmed.length){
    tableRows += `<tr class="section-row"><td colspan="8">✓ Confirmed Lineup (${confirmed.length})</td></tr>`;

  }
  if(projected.length){
    tableRows += `<tr class="section-row"><td colspan="8">Projected / Not Yet Confirmed (${projected.length})</td></tr>`;
    tableRows += projected.map(p=>playerRow(p,g)).join('');
  }

  return `<div class="gc-detail">
    <div class="gcd-conditions">
      ${condBadges(g)}
      ${umpName?`<span class="cbdg ump" style="margin-left:auto">⚖ ${umpName}</span>`:''}

}

    <div class="vs-pitcher">vs ${p.pitcher.n}</div>
    <div class="vs-era" style="color:${['danger','mid','elite'].includes(eraClass(p.pitcher.era))?{danger:'var(--red)',mid:'var(--amber)',elite:'var(--green)'}[eraClass(p.pitcher.era)]:'var(--sub)'}">${p.pitcher.era.toFixed(2)} ERA · ${p.pitcher.h}HP</div>

        const xslgTxt = m.xslg ? ` .${String(Math.round(m.xslg*1000)).padStart(3,'0')} xSLG` : '';
        return `<span style="font-family:'JetBrains Mono',monospace;font-size:7px;font-weight:700;padding:1px 5px;border-radius:3px;background:${bg};color:${c};border:1px solid ${c}40;white-space:nowrap" title="${m.pa>0?m.pa+' PA vs this pitch':''}">${m.name.split(' ')[0]} ${m.pct}%${xslgTxt}</span>`;

  </td>

// ═══════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════
function render() {
  renderInjuryBar();
  renderPicks();
  updateTargetsBadge();

  const isSearch  = activeTab === 'search';
  const isTargets = activeTab === 'targets';
  document.getElementById('searchPanel').style.display  = isSearch  ? '' : 'none';
  document.getElementById('targetsPanel').style.display = isTargets ? '' : 'none';

  if(isSearch)  { document.getElementById('board').innerHTML=''; return; }
  if(isTargets) { renderTargetsPanel(); document.getElementById('board').innerHTML=''; return; }

  if(!activeGames.length) {
    document.getElementById('board').innerHTML='<div class="empty-msg">NO GAMES FOUND FOR THIS DATE</div>';
    return;
  }

  let html = '<div class="games-grid">';
  for(const g of activeGames) html += renderGameCard(g);
  html += '</div>';
  document.getElementById('board').innerHTML = html || '<div class="empty-msg">NO GAMES MATCH CURRENT FILTER</div>';
}

function setSort(col) {
  if(sortCol===col) sortDir = sortDir==='desc'?'asc':'desc';
  else { sortCol=col; sortDir='desc'; }
  render();
}

function scrollToGame(id) {
  if(!id) return;
  expandedGames.add(id);
  render();
  setTimeout(()=>{ const el=document.getElementById(`gc-${id}`); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); },60);
}

function toggleGame(id) {
  expandedGames.has(id) ? expandedGames.delete(id) : expandedGames.add(id);
  render();
}

// ═══════════════════════════════════════════════════
// TARGETS
// ═══════════════════════════════════════════════════
function toggleTarget(name) {
  targetSet.has(name) ? targetSet.delete(name) : targetSet.add(name);
  saveTargets(); updateTargetsBadge(); render();
}
function updateTargetsBadge() {
  const ct = document.getElementById('targetsCt');
  if(!ct) return;
  if(targetSet.size>0){ ct.textContent=targetSet.size; ct.style.display=''; }
  else ct.style.display='none';
}
function renderTargetsPanel() {
  const el = document.getElementById('targetsPanel');
  if(!targetSet.size){ el.innerHTML=`<div class="empty-msg">🎯 NO TARGETS<br><br><span style="font-size:9px">Click ★ on any player to add to watchlist</span></div>`; return; }
  const today=[], seen=new Set();
  for(const g of activeGames) for(const p of buildPlayers(g)) {
    if(targetSet.has(p.name)&&!seen.has(p.name)){ today.push(p); seen.add(p.name); }
  }
  today.sort((a,b)=>b.score-a.score);
  const notPlaying=[...targetSet].filter(n=>!seen.has(n));
  el.innerHTML=`<div style="padding-bottom:14px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap">
      <span style="font-family:'JetBrains Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px">🎯 TARGETS — ${targetSet.size} PLAYER${targetSet.size!==1?'S':''}</span>
      <button onclick="targetSet.clear();saveTargets();updateTargetsBadge();renderTargetsPanel()" style="margin-left:auto;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:8px;padding:4px 12px;cursor:pointer;border-radius:5px;transition:all .1s" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--muted)'">CLEAR ALL</button>
    </div>
    ${today.length?`<div class="pt-wrap"><table class="pt"><thead><tr><th class="td-ph"></th><th>PLAYER</th><th>VS PITCHER</th><th class="r">HR</th><th class="r">BARREL</th><th>EDGES</th><th class="r">SCORE</th><th></th></tr></thead><tbody>${today.map(p=>{const g=activeGames.find(g=>g.id===p.gameId)||activeGames[0];return playerRow(p,g);}).join('')}</tbody></table></div>`:'<div style="font-family:\'JetBrains Mono\',monospace;font-size:9px;color:var(--muted);padding:12px 0">Targets not in today\'s lineup yet — check back after lineups post.</div>'}
    ${notPlaying.length?`<div style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);letter-spacing:2px;margin:12px 0 6px">NOT PLAYING TODAY</div>
    ${notPlaying.map(n=>`<div style="padding:8px 12px;background:var(--card);border:1px solid var(--border);margin-bottom:4px;border-radius:6px;display:flex;align-items:center;justify-content:space-between"><span style="font-weight:700">${n}</span><button onclick="toggleTarget('${n.replace(/'/g,"&#39;")}');event.stopPropagation()" style="background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:14px;transition:color .1s" onmouseover="this.style.color='var(--red)'" onmouseout="this.style.color='var(--muted)'">✕</button></div>`).join('')}`:''}
  </div>`;
}

// ═══════════════════════════════════════════════════
// PARLAY SLIP
// ═══════════════════════════════════════════════════
function handleRowClick(el) {
  try { toggleLeg(JSON.parse(el.dataset.leg)); } catch(e){}
}
function toggleLeg(p) {
  const idx = legs.findIndex(l=>l.name===p.name);
  if(idx>=0) legs.splice(idx,1); else if(legs.length<6) legs.push(p);
  renderSlip(); render();
}
function removeLeg(name) { legs=legs.filter(l=>l.name!==name); renderSlip(); render(); }
function clearSlip() { legs=[]; renderSlip(); render(); }
function renderSlip() {
  const n = legs.length;
  document.getElementById('slipCt').textContent = n;
  const bd = document.getElementById('slipBody');
  if(!n){
    bd.innerHTML='<div class="slip-empty">Click any player row<br>to add to slip.<br><br>Max 6 legs.<br>No same-game parlays.</div>';
    document.getElementById('slipFt').style.display='none';
    return;
  }
  bd.innerHTML = legs.map(l=>`<div class="slip-leg">
    <div class="sl-info">
      <div class="sl-name">${l.name}</div>
      <div class="sl-sub">${l.team} · vs ${l.pitcher}</div>
    </div>
    <div class="sl-score">${l.score}</div>
    <button class="sl-rm" onclick="removeLeg('${l.name.replace(/'/g,"\\'")}');event.stopPropagation()">✕</button>
  </div>`).join('');
  document.getElementById('slipFt').style.display='';
  document.getElementById('sfLegs').textContent = n;
  const avg = Math.round(legs.reduce((s,l)=>s+l.score,0)/n);
  document.getElementById('sfAvg').textContent = avg+'/99';
  const dec = legs.reduce((a,l)=>{ const imp=Math.max(.07,.26-(l.score-50)*.004); return a*(1/imp); },1);
  document.getElementById('sfOdds').textContent = `+${Math.round((dec-1)*100).toLocaleString()}`;
  const hasSGP = new Set(legs.map(l=>l.gameId)).size < n;
  document.getElementById('sfWarn').textContent = hasSGP ? '⚠ Same-game legs detected' : '';
  document.getElementById('slipCopyBtn').disabled = n < 2;
}
function copySlip() {
  const txt = `DIAMOND HR PARLAY — ${displayDate(currentDate)}\n`
    + legs.map(l=>`${l.name} (${l.team}) vs ${l.pitcher} | Composite: ${l.score}`).join('\n')
    + `\n\nEst Odds: ${document.getElementById('sfOdds').textContent}`
    + `\nGenerated: ${new Date().toLocaleString()}`;
  navigator.clipboard?.writeText(txt);
  const b = document.getElementById('slipCopyBtn'); b.textContent='✓ COPIED';
  setTimeout(()=>b.textContent='COPY SLIP', 2200);
}

// ═══════════════════════════════════════════════════
// PLAYER SEARCH
// ═══════════════════════════════════════════════════
let _searchTimer = null;
function debounceSearch(q) {
  clearTimeout(_searchTimer);
  const res=document.getElementById('searchResults');
  if(q.length<2){ res.innerHTML=''; return; }
  _searchTimer = setTimeout(()=>doSearch(q), 320);
}
async function doSearch(q) {
  const res=document.getElementById('searchResults');
  const st=document.getElementById('searchStatus');
  st.style.display=''; st.textContent='...';
  try {
    const r = await fetch(`${API_BASE}/api/search?q=${encodeURIComponent(q)}`,{cache:'no-store'});
    if(!r.ok) throw new Error(`Server error ${r.status}`);
    const data = await r.json();
    st.style.display='none';
    if(!data.length){ res.innerHTML='<div style="font-family:\'JetBrains Mono\',monospace;font-size:9px;color:var(--muted);padding:8px 0">No hitters found.</div>'; return; }
    res.innerHTML = data.map(renderSearchCard).join('');
  } catch(e) {
    st.style.display='none';
    res.innerHTML=`<div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--red);padding:8px 0">⚠ ${e.message}</div>`;
  }
}
function renderSearchCard(p) {
  const t = p.tier||tierOf(p.score||0);
  const c = scoreColor(t);
  const ops3 = p.OPS ? p.OPS.toFixed(3) : '—';
  const chips = [
    `<span class="src-chip">${p.G}G</span>`,
    `<span class="src-chip${p.HR>=15?' hi':''}">${p.HR}HR</span>`,
    `<span class="src-chip${p.hrPct>=20?' hi':''}">${p.hrPct}% HR/G</span>`,
    p.barrel?`<span class="src-chip${p.barrel>=14?' hi':''}">${p.barrel}% BBL</span>`:'',
    p.hardHit?`<span class="src-chip">${p.hardHit}% HH</span>`:'',
    p.avgEV?`<span class="src-chip">${p.avgEV} EV</span>`:'',
    `<span class="src-chip">${ops3} OPS</span>`,
    p.xwOBA?`<span class="src-chip">${p.xwOBA.toFixed(3)} xwOBA</span>`:'',
    p.ppLine!=null?`<span class="src-chip" style="color:var(--purple)">PP ${p.ppLine}</span>`:'',
    p.sprintSpeed?`<span class="src-chip">${p.sprintSpeed}ft/s</span>`:'',
  ].filter(Boolean).join('');
  return `<div class="src-card">
    <div class="src-main">
      <div class="src-name">${p.name}${p.onIL?'<span class="src-il">IL</span>':''}</div>
      <div class="src-meta">${p.team} · ${p.pos||'?'} · Bats ${p.bats||'?'} · PF ${p.parkFactor||100}</div>
      <div class="src-chips">${chips}</div>
    </div>
    <div class="src-score-wrap">
      <div class="src-score" style="color:${c}">${p.score||0}</div>
      <div class="src-lbl">COMPOSITE</div>
      <span class="tier-badge t${t}">${t}</span>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════
// DATE NAV
// ═══════════════════════════════════════════════════
function shiftDay(d) {
  const nd = new Date(currentDate); nd.setDate(nd.getDate()+d);
  currentDate=nd; loadDay(currentDate);
}
function goToday() {
  currentDate=new Date(); currentDate.setHours(0,0,0,0); loadDay(currentDate);
}

// ═══════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════
document.getElementById('filterBar').addEventListener('click', e => {
  const b = e.target.closest('.ftab'); if(!b) return;
  activeTab = b.dataset.tab;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('on','on-g'));
  b.classList.add('on');
  expandedGames = new Set(); // collapse all on tab change
  render();
});

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════
renderSlip();
updateTargetsBadge();
loadDay(currentDate);
</script>
